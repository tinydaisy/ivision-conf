<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>iVision Conf</title>

  <!-- Редирект из браузера в мини-апп — до загрузки SDK -->
  <script>
    (function () {
      var sp = new URLSearchParams(window.location.search);
      var pid = sp.get('new_partner_id') || '';
      var src = sp.get('utm_source') || '';
      if (pid || src) {
        var parts = [];
        if (pid) parts.push(pid);
        if (src) parts.push(src);
        window.location.replace('https://t.me/Margo_forbs_bot/ivision?startapp=ref_' + parts.join('_'));
      }
    })();
  </script>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --brand-teal:   #25455D;
      --brand-peach:  #FFCFA4;
      --brand-purple: #C084FC;
      --bg-dark:  #080B12;
      --bg-mid:   #0D111A;
      --bg-card:  #111827;
      --text:     #F5F0E8;
      --text-muted: rgba(245,240,232,.55);
      --border-peach: rgba(255,207,164,.2);
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-pill: 100px;
      --font-display: 'Bebas Neue', Impact, sans-serif;
      --font-body: 'Roboto', system-ui, sans-serif;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-dark);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.55;
      min-height: 100vh;
    }

    /* ── UTILITIES ─────────────────────────────────────────────────── */
    .container { max-width: 480px; margin: 0 auto; padding: 0 20px; }
    .section { padding: 56px 0; }
    .section-alt { background: var(--bg-mid); }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--brand-peach);
      margin-bottom: 12px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 9vw, 48px);
      line-height: 1;
      letter-spacing: .02em;
      margin-bottom: 8px;
    }

    .section-sub {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* ── PILL BADGE ─────────────────────────────────────────────────── */
    .pill {
      display: inline-block;
      background: rgba(255,207,164,.1);
      border: 1px solid rgba(255,207,164,.25);
      color: var(--brand-peach);
      border-radius: var(--radius-pill);
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ── BUTTONS ────────────────────────────────────────────────────── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 17px 24px;
      background: var(--brand-peach);
      color: #080B12;
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      text-align: center;
    }
    .btn-primary:active { opacity: .85; transform: scale(.98); }

    .btn-ghost {
      display: block;
      width: 100%;
      padding: 16px 24px;
      background: transparent;
      color: var(--brand-peach);
      border: 1px solid rgba(255,207,164,.35);
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      text-align: center;
    }
    .btn-ghost:active { background: rgba(255,207,164,.08); }

    /* ── CARDS ──────────────────────────────────────────────────────── */
    .card {
      background: rgba(17,24,39,.7);
      border: 1px solid var(--border-peach);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(20px);
      padding: 28px;
    }

    /* ── HERO ───────────────────────────────────────────────────────── */
    #hero {
      background: linear-gradient(160deg, #25455D 0%, #080B12 65%);
      padding: 48px 0 56px;
      position: relative;
      overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(192,132,252,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label { margin-bottom: 16px; }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(44px, 13vw, 72px);
      line-height: .95;
      letter-spacing: .02em;
      margin-bottom: 6px;
    }
    .hero-title span { color: var(--brand-peach); }
    .hero-tagline {
      font-size: clamp(16px, 4vw, 20px);
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .hero-subtitle {
      font-size: 13px;
      font-weight: 600;
      color: var(--brand-purple);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
    }
    .hero-meta-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .hero-meta-item .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--brand-peach);
      flex-shrink: 0;
    }
    .hero-greeting {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 14px;
      text-align: center;
    }

    /* ── SPEAKERS ───────────────────────────────────────────────────── */
    .speakers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 28px;
    }
    .speaker-card {
      background: rgba(17,24,39,.7);
      border: 1px solid var(--border-peach);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(20px);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
    }
    .speaker-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid var(--border-peach);
    }
    .speaker-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .speaker-initials {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--brand-teal), var(--brand-purple));
      color: #fff;
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: .05em;
    }
    .speaker-name {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
    }
    .speaker-role {
      font-size: 11px;
      color: var(--brand-peach);
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .speaker-creds {
      list-style: none;
      text-align: left;
      width: 100%;
    }
    .speaker-creds li {
      font-size: 11px;
      color: var(--text-muted);
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,207,164,.07);
      line-height: 1.4;
    }
    .speaker-creds li:last-child { border-bottom: none; }

    /* ── BENEFITS ───────────────────────────────────────────────────── */
    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 28px;
    }
    .benefit-card {
      background: rgba(17,24,39,.7);
      border: 1px solid rgba(255,207,164,.12);
      border-radius: var(--radius-md);
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .benefit-icon {
      font-size: 26px;
      line-height: 1;
    }
    .benefit-text {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text);
    }

    /* ── SCHEDULE ───────────────────────────────────────────────────── */
    .schedule-days {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 28px;
    }
    .schedule-day-title {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--brand-peach);
      margin-bottom: 12px;
      letter-spacing: .05em;
    }
    .schedule-slot {
      display: flex;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,207,164,.07);
      align-items: flex-start;
    }
    .schedule-slot:last-child { border-bottom: none; }
    .slot-time {
      font-size: 12px;
      font-weight: 700;
      color: var(--brand-peach);
      min-width: 44px;
      padding-top: 1px;
    }
    .slot-title {
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
    }

    /* ── BONUSES ────────────────────────────────────────────────────── */
    .bonuses-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 28px;
    }
    .bonus-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(17,24,39,.5);
      border: 1px solid rgba(255,207,164,.1);
      border-radius: var(--radius-md);
      padding: 14px 16px;
    }
    .bonus-arrow {
      color: var(--brand-peach);
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .bonus-text {
      font-size: 14px;
      line-height: 1.45;
    }

    /* ── TARIFFS ────────────────────────────────────────────────────── */
    .tariffs-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 28px;
    }
    .tariff-card {
      background: rgba(17,24,39,.7);
      border: 1px solid var(--border-peach);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(20px);
      padding: 28px 24px;
      position: relative;
    }
    .tariff-card.recommended {
      border-color: transparent;
      background: linear-gradient(var(--bg-card), var(--bg-card)) padding-box,
                  linear-gradient(135deg, var(--brand-peach), var(--brand-purple)) border-box;
      box-shadow: 0 0 48px rgba(200,75,158,.1);
    }
    .tariff-badge {
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--brand-peach), var(--brand-purple));
      color: #080B12;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 4px 16px;
      border-radius: var(--radius-pill);
      white-space: nowrap;
    }
    .tariff-name {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: .05em;
      margin-bottom: 4px;
    }
    .tariff-price {
      font-size: 28px;
      font-weight: 700;
      color: var(--brand-peach);
      margin-bottom: 20px;
    }
    .tariff-features {
      list-style: none;
      margin-bottom: 24px;
    }
    .tariff-features li {
      font-size: 14px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,207,164,.07);
      color: var(--text-muted);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .tariff-features li:last-child { border-bottom: none; }
    .tariff-features li::before {
      content: '→';
      color: var(--brand-peach);
      flex-shrink: 0;
      font-size: 13px;
      margin-top: 1px;
    }

    /* ── FINAL CTA ──────────────────────────────────────────────────── */
    #final-cta {
      background: linear-gradient(160deg, #25455D 0%, #080B12 65%);
      padding: 56px 0;
      text-align: center;
    }
    #final-cta .section-title { margin-bottom: 16px; }

    /* ── GC MODAL ───────────────────────────────────────────────────── */
    #gc-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,11,18,.88);
      z-index: 99999;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      backdrop-filter: blur(6px);
    }
    .gc-modal-inner {
      background: #16162a;
      border: 1px solid rgba(255,207,164,.2);
      padding: 52px 20px 32px;
      border-radius: var(--radius-lg);
      width: 92%;
      max-width: 440px;
      position: relative;
      margin: 40px auto;
    }
    .gc-modal-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none; border: none;
      color: #aaa; font-size: 30px;
      cursor: pointer; line-height: 1;
    }

    /* ── ACCESS SCREEN ──────────────────────────────────────────────── */
    #access-screen {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
      padding: 40px 24px;
      background: linear-gradient(160deg, #25455D 0%, #080B12 65%);
    }
    .access-icon { font-size: 64px; }
    #access-screen h2 {
      font-family: var(--font-display);
      font-size: 36px;
      letter-spacing: .03em;
    }
    #access-screen p { font-size: 15px; color: var(--text-muted); max-width: 280px; line-height: 1.6; }

    /* ── LOADING ────────────────────────────────────────────────────── */
    #loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,207,164,.15);
      border-top-color: var(--brand-peach);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-muted); }
  </style>
</head>
<body>

  <!-- Загрузка -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Загрузка…</div>
  </div>

  <!-- Основной контент (заполняется JS) -->
  <div id="app" style="display:none"></div>

  <!-- Экран после регистрации -->
  <div id="access-screen">
    <div class="access-icon">🎉</div>
    <h2>Вы зарегистрированы!</h2>
    <p>Доступ к материалам конференции будет открыт совсем скоро.<br>Мы пришлём уведомление.</p>
    <p id="access-greeting" style="font-size:13px;color:rgba(245,240,232,.4)"></p>
  </div>

  <!-- Попап виджета GetCourse -->
  <div id="gc-modal" onclick="if(event.target===this)closeGCModal()">
    <div class="gc-modal-inner">
      <button class="gc-modal-close" onclick="closeGCModal()">×</button>
      <div id="gc-widget-container"></div>
    </div>
  </div>

  <script>
    var tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    var DATA_URL = './ivision-7.json';
    var activeScriptId = null;

    function openGCModal(scriptId, scriptSrc) {
      var container = document.getElementById('gc-widget-container');
      // Загружаем виджет только если он ещё не загружен для этого тарифа
      if (activeScriptId !== scriptId) {
        container.innerHTML = '';
        var s = document.createElement('script');
        s.id  = scriptId;
        s.src = scriptSrc;
        container.appendChild(s);
        activeScriptId = scriptId;
      }
      document.getElementById('gc-modal').style.display = 'flex';
    }

    function closeGCModal() {
      document.getElementById('gc-modal').style.display = 'none';
    }

    // ── Экран "доступ получен" при startapp=free ──────────────────────
    var startParam = tg.initDataUnsafe && tg.initDataUnsafe.start_param || '';
    if (startParam === 'free') {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('access-screen').style.display = 'flex';
      var firstName = tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name;
      if (firstName) {
        document.getElementById('access-greeting').textContent = firstName + ', ждём тебя на конференции!';
      }
    } else {
      // ── Загружаем данные конференции из JSON ──────────────────────
      fetch(DATA_URL)
        .then(function(r) { return r.json(); })
        .then(function(conf) {
          renderConf(conf);
          document.getElementById('loading').style.display = 'none';
          document.getElementById('app').style.display = 'block';
        })
        .catch(function() {
          document.getElementById('loading').innerHTML =
            '<p style="color:rgba(245,240,232,.5);text-align:center;padding:40px 24px">Не удалось загрузить данные.<br>Попробуй обновить страницу.</p>';
        });
    }

    // ── Рендер всей страницы из JSON ─────────────────────────────────
    function renderConf(c) {
      var firstName = tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name;

      // Разбираем start_param если есть UTM (ref_PARTNERID_SOURCE)
      var utmParams = '';
      if (startParam && startParam.startsWith('ref_')) {
        var parts = startParam.slice(4).split('_');
        var utm = {};
        if (parts[0]) utm.new_partner_id = parts[0];
        if (parts[1]) utm.utm_source     = parts[1];
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
          utm.tg_id = String(tg.initDataUnsafe.user.id);
        }
        utmParams = '?' + new URLSearchParams(utm).toString();
      }

      var html = '';

      // ─── HERO ───────────────────────────────────────────────────────
      html += '<section id="hero"><div class="container">';
      html += '<div class="hero-label"><span class="pill">' + esc(c.hero_label) + '</span></div>';
      html += '<h1 class="hero-title">' + esc(c.name).replace('/', '/<br>') + '</h1>';
      html += '<p class="hero-tagline">' + esc(c.tagline) + '</p>';
      html += '<p class="hero-subtitle">' + esc(c.subtitle) + '</p>';
      html += '<div class="hero-meta">';
      html += '<div class="hero-meta-item"><div class="dot"></div>' + esc(c.dates) + '</div>';
      html += '<div class="hero-meta-item"><div class="dot"></div>' + esc(c.format) + '</div>';
      html += '<div class="hero-meta-item"><div class="dot"></div>' + esc(c.capacity) + '</div>';
      html += '</div>';
      html += '<button class="btn-primary" onclick="openGCModal(\'' + esc(c.tariffs[0].gc_script_id) + '\',\'' + esc(c.tariffs[0].gc_script_src) + '\')">Зарегистрироваться бесплатно</button>';
      if (firstName) {
        html += '<p class="hero-greeting">Привет, ' + esc(firstName) + '! 👋</p>';
      }
      html += '</div></section>';

      // ─── SPEAKERS ────────────────────────────────────────────────────
      html += '<section class="section section-alt"><div class="container">';
      html += '<div class="section-label">Спикеры</div>';
      html += '<div class="section-title">Эксперты<br>конференции</div>';
      html += '<div class="speakers-grid">';
      c.speakers.forEach(function(sp) {
        html += '<div class="speaker-card">';
        html += '<div class="speaker-avatar">';
        if (sp.photo_url) {
          html += '<img src="' + esc(sp.photo_url) + '" alt="' + esc(sp.name) + '">';
        } else {
          html += '<div class="speaker-initials">' + esc(sp.initials) + '</div>';
        }
        html += '</div>';
        html += '<div class="speaker-role">' + esc(sp.role) + '</div>';
        html += '<div class="speaker-name">' + esc(sp.name) + '</div>';
        html += '<ul class="speaker-creds">';
        sp.credentials.forEach(function(cr) {
          html += '<li>' + esc(cr) + '</li>';
        });
        html += '</ul></div>';
      });
      html += '</div></div></section>';

      // ─── BENEFITS ────────────────────────────────────────────────────
      html += '<section class="section"><div class="container">';
      html += '<div class="section-label">Что вы получите</div>';
      html += '<div class="section-title">За 2 дня<br>конференции</div>';
      html += '<div class="benefits-grid">';
      c.benefits.forEach(function(b) {
        html += '<div class="benefit-card"><div class="benefit-icon">' + b.icon + '</div><div class="benefit-text">' + esc(b.text) + '</div></div>';
      });
      html += '</div>';
      html += '<div style="margin-top:28px">';
      html += '<button class="btn-ghost" onclick="openGCModal(\'' + esc(c.tariffs[0].gc_script_id) + '\',\'' + esc(c.tariffs[0].gc_script_src) + '\')">Занять место на конференции</button>';
      html += '</div></div></section>';

      // ─── SCHEDULE ────────────────────────────────────────────────────
      html += '<section class="section section-alt"><div class="container">';
      html += '<div class="section-label">Расписание</div>';
      html += '<div class="section-title">Программа</div>';
      html += '<div class="schedule-days">';
      c.schedule.forEach(function(day) {
        html += '<div class="card">';
        html += '<div class="schedule-day-title">' + esc(day.day) + ' · ' + esc(day.date) + '</div>';
        day.slots.forEach(function(slot) {
          html += '<div class="schedule-slot">';
          html += '<div class="slot-time">' + esc(slot.time) + '</div>';
          html += '<div class="slot-title">' + esc(slot.title) + '</div>';
          html += '</div>';
        });
        html += '</div>';
      });
      html += '</div></div></section>';

      // ─── BONUSES ─────────────────────────────────────────────────────
      html += '<section class="section"><div class="container">';
      html += '<div class="section-label">Подарки</div>';
      html += '<div class="section-title">Бесплатные<br>бонусы</div>';
      html += '<p class="section-sub">Каждый участник получает бесплатно:</p>';
      html += '<div class="bonuses-list">';
      c.bonuses.forEach(function(b) {
        html += '<div class="bonus-item"><div class="bonus-arrow">→</div><div class="bonus-text">' + esc(b) + '</div></div>';
      });
      html += '</div></div></section>';

      // ─── TARIFFS ─────────────────────────────────────────────────────
      html += '<section class="section section-alt"><div class="container">';
      html += '<div class="section-label">Участие</div>';
      html += '<div class="section-title">Тарифы</div>';
      html += '<div class="tariffs-list">';
      c.tariffs.forEach(function(t) {
        var cls = t.recommended ? 'tariff-card recommended' : 'tariff-card';
        html += '<div class="' + cls + '">';
        if (t.recommended) html += '<div class="tariff-badge">Рекомендуется</div>';
        html += '<div class="tariff-name">' + esc(t.name) + '</div>';
        html += '<div class="tariff-price">' + esc(t.price_label) + '</div>';
        html += '<ul class="tariff-features">';
        t.features.forEach(function(f) {
          html += '<li>' + esc(f) + '</li>';
        });
        html += '</ul>';
        html += '<button class="btn-primary" onclick="openGCModal(\'' + esc(t.gc_script_id) + '\',\'' + esc(t.gc_script_src) + '\')">Выбрать тариф</button>';
        html += '</div>';
      });
      html += '</div></div></section>';

      // ─── FINAL CTA ────────────────────────────────────────────────────
      html += '<section id="final-cta"><div class="container">';
      html += '<div class="section-label" style="text-align:center">Регистрация</div>';
      html += '<div class="section-title" style="text-align:center">Твоё место<br>ждёт тебя</div>';
      html += '<p style="text-align:center;color:rgba(245,240,232,.55);margin-bottom:28px;font-size:14px">';
      html += esc(c.dates) + ' · ' + esc(c.format) + '</p>';
      html += '<button class="btn-primary" onclick="openGCModal(\'' + esc(c.tariffs[0].gc_script_id) + '\',\'' + esc(c.tariffs[0].gc_script_src) + '\')">Зарегистрироваться бесплатно</button>';
      html += '</div></section>';

      document.getElementById('app').innerHTML = html;
    }

    // ── Экранирование HTML ────────────────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
