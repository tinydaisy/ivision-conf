<!DOCTYPE html>
<!-- Cache bust: 2026-04-23 inline-widget -->
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>iViSiON: Ж.И.В.У. — Международный Чемпионат Креативных Спикеров</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --brand-teal:#25455D;--brand-peach:#FFCFA4;--brand-purple:#C084FC;--brand-pink:#C84B9E;--brand-pink-light:#DD85B8;
      --bg-dark:#080B12;--bg-mid:#0D111A;--bg-card:#111827;
      --text-light:#F5F0E8;--text-muted:rgba(245,240,232,.55);--text-dim:rgba(245,240,232,.32);
      --border:rgba(37,69,93,.45);--border-peach:rgba(255,207,164,.2);
      --btn-grad:linear-gradient(135deg,#FFCFA4 0%,#C084FC 50%,#25455D 100%);
      --font-display:'Bebas Neue',Impact,sans-serif;
      --font-body:'Roboto',system-ui,sans-serif;
      --radius-sm:8px;--radius-md:16px;--radius-lg:24px;--radius-pill:100px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;overflow-x:hidden;max-width:100%;}
    body{font-family:var(--font-body);background:var(--bg-dark);color:var(--text-light);line-height:1.6;overflow-x:hidden;max-width:100%;display:flex;flex-direction:column;min-height:100vh;}
    img{max-width:100%;display:block;}
    a{text-decoration:none;color:inherit;}

    .container{max-width:1200px;margin:0 auto;padding:0 24px;}

    /* GLOW BG */
    .glow-pink{background:radial-gradient(ellipse,rgba(200,75,158,.12) 0%,transparent 65%);width:600px;height:600px;position:absolute;pointer-events:none;user-select:none;}
    .glow-teal{background:radial-gradient(ellipse,rgba(37,69,93,.28) 0%,transparent 65%);width:500px;height:500px;position:absolute;pointer-events:none;user-select:none;}

    /* RINGS SVG */
    .rings-deco{position:absolute;pointer-events:none;user-select:none;}

    /* HERO */
    #hero{position:relative;flex:1;display:flex;align-items:center;background:linear-gradient(160deg,#25455D 0%,#080B12 60%);overflow:hidden;padding:120px 0 80px;}
    .hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:flex-start;position:relative;z-index:2;padding-top:40px;}
    .hero-label{font-family:var(--font-body);font-weight:700;font-size:clamp(13px,3vw,15px);letter-spacing:.22em;text-transform:uppercase;color:var(--brand-peach);margin-bottom:20px;}
    .hero-h1{font-family:var(--font-display);font-size:clamp(64px,8vw,110px);letter-spacing:.02em;line-height:.95;color:var(--text-light);margin-bottom:24px;}
    .hero-h1-line1{display:inline-block;width:fit-content;font-size:1.2em;}
    .hero-h1-line2{display:flex;align-items:baseline;gap:8px;width:fit-content;}
    .hero-h1-brand{color:var(--brand-peach);}
    .hero-h1-accent{background:linear-gradient(to bottom,#C84B9E 0%,#6B4FA0 50%,#1A3A5C 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.08em;}
    .hero-sub{font-size:18px;font-weight:700;color:var(--text-light);margin-bottom:24px;line-height:1.4;}

    /* HERO PHOTO */
    .hero-photo-wrap{position:relative;display:flex;justify-content:center;align-items:center;}
    .hero-photo{width:100%;max-width:460px;aspect-ratio:3/4;object-fit:cover;object-position:top;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;border:2px solid rgba(255,207,164,.2);position:relative;z-index:2;}
    .hero-deco-circle{position:absolute;border-radius:50%;pointer-events:none;}
    .hero-deco-1{width:120px;height:120px;border:1.5px solid rgba(255,207,164,.3);border-radius:30% 70% 70% 30% / 30% 30% 70% 70%;top:10%;right:0;}
    .hero-deco-2{width:80px;height:80px;background:rgba(200,75,158,.25);bottom:15%;left:0;z-index:0;}

    .hero-rings{position:absolute;right:-100px;top:50%;transform:translateY(-50%);width:700px;height:700px;opacity:.5;z-index:1;animation:rotateRings 80s linear infinite;}
    @keyframes rotateRings{to{transform:translateY(-50%) rotate(360deg);}}

    /* GC INLINE WIDGET */
    .gc-widget-inline{background:#16162a;border:1px solid rgba(255,207,164,.2);padding:24px 18px;border-radius:var(--radius-lg);margin-top:8px;}

    /* FOOTER */
    #site-footer{background:#04060d;padding:32px 0;border-top:1px solid rgba(255,207,164,.1);}
    .footer-links{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px;}
    .footer-links a{font-size:12px;color:var(--text-muted);text-decoration:underline;text-underline-offset:3px;transition:color .2s;}
    .footer-links a:hover{color:var(--brand-peach);}
    .footer-legal{font-size:12px;color:var(--text-dim);line-height:1.7;}

    @media(max-width:768px){
      .container{padding:0 20px;}
      #hero{padding:80px 0 60px;}
      .hero-grid{grid-template-columns:1fr;gap:32px;padding-top:20px;}
      .hero-rings{right:auto;left:-200px;width:500px;height:500px;opacity:.25;}
      .hero-h1{font-size:clamp(44px,11vw,64px);margin-bottom:20px;}
      .hero-h1-line2{flex-wrap:wrap;gap:6px;}
      .hero-h1-accent{letter-spacing:.04em;}
      .hero-sub{font-size:15px;}
      .hero-photo{max-width:300px;}
    }
  </style>
</head>
<body>

<!-- HERO -->
<section id="hero">

    <circle cx="350" cy="350" r="200" fill="none" stroke="url(#rg1)" stroke-width="0.8" opacity="0.33"/>
    <circle cx="350" cy="350" r="225" fill="none" stroke="url(#rg1)" stroke-width="0.8" opacity="0.28"/>
    <circle cx="350" cy="350" r="250" fill="none" stroke="url(#rg1)" stroke-width="0.8" opacity="0.23"/>
    <circle cx="350" cy="350" r="275" fill="none" stroke="url(#rg1)" stroke-width="0.8" opacity="0.18"/>
    <circle cx="350" cy="350" r="300" fill="none" stroke="url(#rg1)" stroke-width="0.8" opacity="0.14"/>
    <circle cx="350" cy="350" r="325" fill="none" stroke="url(#rg1)" stroke-width="0.6" opacity="0.10"/>
    <circle cx="350" cy="350" r="345" fill="none" stroke="url(#rg1)" stroke-width="0.5" opacity="0.07"/>
  </svg>

  <div class="container">
    <div class="hero-grid">
      <!-- LEFT: TEXT -->
      <div class="hero-content">
        <p class="hero-label">Международный чемпионат <span style="color:var(--brand-pink-light);">креативных</span> спикеров</p>
        <h1 class="hero-h1">
          <span class="hero-h1-line1">ЧЕМПИОНАТ</span><br>
          <span class="hero-h1-line2">
            <span class="hero-h1-brand">iViSiON:</span>
            <span class="hero-h1-accent">Ж.И.В.У.</span>
          </span>
        </h1>
        <p class="hero-sub">Живые <span style="color:var(--brand-peach);">·</span> Истинные <span style="color:var(--brand-peach);">·</span> Влиятельные <span style="color:var(--brand-peach);">·</span> Успешные</p>

        <div class="gc-widget-inline">
          <script id="5634992f208b036755537d4a1b2b3114dd6657cd" src="https://medialift.margoforbs.ru/pl/lite/widget/script?id=1594285"></script>
        </div>
      </div>

      <!-- RIGHT: PHOTO -->
      <div class="hero-photo-wrap">
        <div class="hero-deco-circle hero-deco-1"></div>
        <div class="hero-deco-circle hero-deco-2"></div>
        <img src="https://pub-1d2696bcb28146eabdf21d47669b01c5.r2.dev/turnir_zhivu/merch_1.png" alt="iViSiON Merch" class="hero-photo">
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer id="site-footer">
  <div class="container">
    <div class="footer-links">
      <a href="https://medialift.margoforbs.ru/oferta_list" target="_blank">Договор оферты</a>
      <a href="https://medialift.margoforbs.ru/politika" target="_blank">Политика обработки данных</a>
    </div>
    <div class="footer-legal">ИП САХИБГАРЕЕВА МАРГАРИТА ВЛАДИМИРОВНА · ИНН 890306512862</div>
  </div>
</footer>

</body>
</html>
