<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- 3 следа идущих ног по диагонали -->

  <!-- След 1 (правая нога, левый нижний) -->
  <g transform="translate(30 135) rotate(-15)">
    <!-- Свод стопы -->
    <path d="M 0 0
             C -8 0, -12 10, -10 25
             C -8 38, 2 42, 10 40
             C 18 38, 20 28, 18 15
             C 16 3, 8 0, 0 0 Z"
          fill="#FFCFA4" fill-opacity="0.35" stroke="#FFCFA4" stroke-width="2" stroke-linejoin="round"/>
    <!-- Большой палец -->
    <ellipse cx="-4" cy="-8" rx="4" ry="5" fill="#FFCFA4" fill-opacity="0.5" stroke="#FFCFA4" stroke-width="1.5"/>
    <!-- Остальные пальцы -->
    <ellipse cx="3" cy="-11" rx="3" ry="4" fill="#FFCFA4" fill-opacity="0.5" stroke="#FFCFA4" stroke-width="1.5"/>
    <ellipse cx="9" cy="-10" rx="2.5" ry="3.5" fill="#FFCFA4" fill-opacity="0.5" stroke="#FFCFA4" stroke-width="1.5"/>
    <ellipse cx="14" cy="-8" rx="2.5" ry="3" fill="#FFCFA4" fill-opacity="0.5" stroke="#FFCFA4" stroke-width="1.5"/>
    <ellipse cx="18" cy="-5" rx="2" ry="2.5" fill="#FFCFA4" fill-opacity="0.5" stroke="#FFCFA4" stroke-width="1.5"/>
  </g>

  <!-- След 2 (левая нога, центр) -->
  <g transform="translate(95 85) rotate(10) scale(-1 1)">
    <!-- Свод стопы -->
    <path d="M 0 0
             C -8 0, -12 10, -10 25
             C -8 38, 2 42, 10 40
             C 18 38, 20 28, 18 15
             C 16 3, 8 0, 0 0 Z"
          fill="#FFCFA4" fill-opacity="0.55" stroke="#FFCFA4" stroke-width="2" stroke-linejoin="round"/>
    <!-- Большой палец -->
    <ellipse cx="-4" cy="-8" rx="4" ry="5" fill="#FFCFA4" fill-opacity="0.7" stroke="#FFCFA4" stroke-width="1.5"/>
    <!-- Остальные пальцы -->
    <ellipse cx="3" cy="-11" rx="3" ry="4" fill="#FFCFA4" fill-opacity="0.7" stroke="#FFCFA4" stroke-width="1.5"/>
    <ellipse cx="9" cy="-10" rx="2.5" ry="3.5" fill="#FFCFA4" fill-opacity="0.7" stroke="#FFCFA4" stroke-width="1.5"/>
    <ellipse cx="14" cy="-8" rx="2.5" ry="3" fill="#FFCFA4" fill-opacity="0.7" stroke="#FFCFA4" stroke-width="1.5"/>
    <ellipse cx="18" cy="-5" rx="2" ry="2.5" fill="#FFCFA4" fill-opacity="0.7" stroke="#FFCFA4" stroke-width="1.5"/>
  </g>

  <!-- След 3 (правая нога, правый верхний) -->
  <g transform="translate(155 35) rotate(-15)">
    <!-- Свод стопы -->
    <path d="M 0 0
             C -8 0, -12 10, -10 25
             C -8 38, 2 42, 10 40
             C 18 38, 20 28, 18 15
             C 16 3, 8 0, 0 0 Z"
          fill="#FFCFA4" fill-opacity="0.8" stroke="#FFCFA4" stroke-width="2" stroke-linejoin="round"/>
    <!-- Большой палец -->
    <ellipse cx="-4" cy="-8" rx="4" ry="5" fill="#FFCFA4" fill-opacity="0.9" stroke="#FFCFA4" stroke-width="1.5"/>
    <!-- Остальные пальцы -->
    <ellipse cx="3" cy="-11" rx="3" ry="4" fill="#FFCFA4" fill-opacity="0.9" stroke="#FFCFA4" stroke-width="1.5"/>
    <ellipse cx="9" cy="-10" rx="2.5" ry="3.5" fill="#FFCFA4" fill-opacity="0.9" stroke="#FFCFA4" stroke-width="1.5"/>
    <ellipse cx="14" cy="-8" rx="2.5" ry="3" fill="#FFCFA4" fill-opacity="0.9" stroke="#FFCFA4" stroke-width="1.5"/>
    <ellipse cx="18" cy="-5" rx="2" ry="2.5" fill="#FFCFA4" fill-opacity="0.9" stroke="#FFCFA4" stroke-width="1.5"/>
  </g>
</svg>
