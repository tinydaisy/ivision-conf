<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iVision Conf</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <script>
    const BOT_USERNAME = "margo_forbs_bot";
    const LANDING      = "https://medialift.margoforbs.ru/ivision-conf-7";

    const sp             = new URLSearchParams(window.location.search);
    const new_partner_id = sp.get("new_partner_id") || "";
    const utm_source     = sp.get("utm_source")     || "";
    const tg_id          = sp.get("tg_id")          || "";

    const tg = window.Telegram.WebApp;

    // ── Режим 1: открыто внутри Telegram (мини-апп) ──────────────────────
    // tg.initData не пуст → мы внутри бота → открываем лендинг
    if (tg.initData) {
      tg.ready();
      tg.expand();

      const params = {};
      if (new_partner_id) params.new_partner_id = new_partner_id;
      if (utm_source)     params.utm_source     = utm_source;
      if (tg_id)          params.tg_id          = tg_id;

      const query = new URLSearchParams(params).toString();
      const url   = query ? `${LANDING}?${query}` : LANDING;

      // Открываем лендинг прямо внутри WebView мини-апа (не внешний браузер)
      window.location.href = url;

    // ── Режим 2: открыто в браузере (по ссылке из Instagram / рекламы) ───
    // Читаем UTM, кодируем в start-параметр и отправляем человека в бот
    } else {
      const parts = [];
      if (new_partner_id) parts.push(new_partner_id);
      if (utm_source)     parts.push(utm_source);

      const startParam = parts.length ? "ref_" + parts.join("_") : "";
      const botUrl     = startParam
        ? `https://t.me/${BOT_USERNAME}?start=${startParam}`
        : `https://t.me/${BOT_USERNAME}`;

      window.location.href = botUrl;
    }
  </script>
</body>
</html>
