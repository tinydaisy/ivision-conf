<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iVision Conf</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--tg-theme-bg-color, #1c1c1e);
      color: var(--tg-theme-text-color, #ffffff);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px 24px;
      text-align: center;
    }

    .badge {
      background: rgba(108,99,255,0.15);
      color: #6c63ff;
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    h1 span { color: #6c63ff; }

    .subtitle {
      font-size: 16px;
      opacity: 0.6;
      line-height: 1.6;
      max-width: 300px;
    }

    .date {
      font-size: 18px;
      font-weight: 600;
      color: #6c63ff;
    }

    .btn {
      width: 100%;
      max-width: 320px;
      padding: 16px 24px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { opacity: 0.85; transform: scale(0.98); }

    .greeting {
      font-size: 14px;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
  </script>

  <div class="badge">Онлайн-конференция</div>

  <h1>iVision <span>Conf</span></h1>

  <p class="subtitle">Конференция для экспертов и предпринимателей нового времени</p>

  <div class="date">📅 Дата будет объявлена</div>

  <button class="btn" id="btn">Зарегистрироваться</button>

  <p class="greeting" id="greeting"></p>

  <script>
    // Приветствие с именем пользователя Telegram
    const user = tg.initDataUnsafe?.user;
    if (user?.first_name) {
      document.getElementById("greeting").textContent =
        `Привет, ${user.first_name}! 👋`;
    }

    // Сюда позже добавим виджет оплаты GetCourse
    document.getElementById("btn").onclick = () => {
      alert("Здесь будет виджет регистрации GetCourse");
    };
  </script>
</body>
</html>
