<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>iVision</title>
  <script src="/redirect_web_app/app_config.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    var DEFAULT = '/ivision-conf-7';
    var PAGES = {
      "conf7":   "/ivision-conf-7",
      "spkrs":   "/ivision-for-speakers",
      "ntwrk":   "/networking",
      "razbory": "/razbory-meet"
    };

    var twa        = window.Telegram && window.Telegram.WebApp;
    var sp         = '';
    var userId     = '';
    var firstName  = '';
    var lastName   = '';
    var username   = '';
    var partnerId  = '';

    if (twa) {
      twa.ready();
      twa.expand();
      sp = (twa.initDataUnsafe && twa.initDataUnsafe.start_param) || '';
      var u = twa.initDataUnsafe && twa.initDataUnsafe.user;
      if (u) {
        userId    = String(u.id || '');
        firstName = u.first_name  || '';
        lastName  = u.last_name   || '';
        username  = u.username    || '';
      }
    }

    // Dev-fallback: ?sp=ref_pgconf7_pid123_srcinsta
    if (!sp) sp = new URLSearchParams(window.location.search).get('sp') || '';

    // Определяем страницу назначения и partner_id из start_param
    var dest = DEFAULT;
    sp.split('_').forEach(function (part) {
      if (part.indexOf('pg')  === 0) { var code = part.slice(2); if (PAGES[code]) dest = PAGES[code]; }
      if (part.indexOf('pid') === 0) { partnerId = part.slice(3); }
    });

    // Вызываем наш бэкенд: он отправит сообщение через Telegram Bot API
    function sendEvent(event) {
      try {
        fetch('/api/event', {
          method:    'POST',
          keepalive: true,
          headers:   { 'Content-Type': 'application/json' },
          body:      JSON.stringify({
            user_id:    userId,
            event:      event,
            first_name: firstName,
            last_name:  lastName,
            username:   username,
            partner_id: partnerId
          })
        });
      } catch (e) {}
    }

    function go() {
      if (userId) sendEvent('event_start');
      setTimeout(function () { window.location.replace(dest); }, 200);
    }

    // requestWriteAccess:
    //   новый пользователь  → показывает диалог «Разрешить боту писать сообщения»
    //   повторный           → тихо возвращает true, диалог не показывается
    if (twa && twa.requestWriteAccess) {
      twa.requestWriteAccess(function () { go(); });
    } else {
      go();
    }
  </script>
</head>
<body></body>
</html>
