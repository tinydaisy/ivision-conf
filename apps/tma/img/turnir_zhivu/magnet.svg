<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Магнит-подкова (U-образный) притягивающий 2 сердца волнами -->
  <g stroke="#FFCFA4" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">

    <!-- Корпус магнита-подковы (U-образная форма, открыта вверх) -->
    <path d="M 55 50
             V 110
             C 55 135, 75 155, 100 155
             C 125 155, 145 135, 145 110
             V 50"
          fill="none"/>

    <!-- Внутренний контур подковы -->
    <path d="M 80 50
             V 110
             C 80 121, 89 130, 100 130
             C 111 130, 120 121, 120 110
             V 50"
          fill="#FFCFA4" fill-opacity="0.15"/>

    <!-- Левый полюс (колпачок) -->
    <path d="M 55 50 H 80 V 35 H 55 Z"
          fill="#FFCFA4" fill-opacity="0.6"/>

    <!-- Правый полюс (колпачок) -->
    <path d="M 120 50 H 145 V 35 H 120 Z"
          fill="#FFCFA4" fill-opacity="0.6"/>

    <!-- Волны притяжения над магнитом (дуги) -->
    <path d="M 55 30 Q 100 5, 145 30" opacity="0.75" fill="none"/>
    <path d="M 45 22 Q 100 -10, 155 22" opacity="0.5" fill="none" stroke-width="2.5"/>
    <path d="M 38 15 Q 100 -22, 162 15" opacity="0.3" fill="none" stroke-width="2"/>
  </g>

  <!-- Два сердца над магнитом, притягиваются к нему -->
  <g fill="#FFCFA4" stroke="#FFCFA4" stroke-width="2" stroke-linejoin="round">
    <!-- Левое сердце -->
    <path d="M 70 -5
             C 62 -13, 48 -13, 48 0
             C 48 12, 70 22, 70 22
             C 70 22, 92 12, 92 0
             C 92 -13, 78 -13, 70 -5 Z"
          transform="translate(0 15)" fill-opacity="0.85"/>

    <!-- Правое сердце -->
    <path d="M 130 -10
             C 122 -18, 108 -18, 108 -5
             C 108 7, 130 17, 130 17
             C 130 17, 152 7, 152 -5
             C 152 -18, 138 -18, 130 -10 Z"
          transform="translate(0 18)" fill-opacity="0.85"/>
  </g>

  <!-- Тонкие линии притяжения от сердец к магниту -->
  <g stroke="#FFCFA4" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.5">
    <line x1="70" y1="40" x2="67" y2="50"/>
    <line x1="130" y1="42" x2="133" y2="50"/>
  </g>
</svg>
