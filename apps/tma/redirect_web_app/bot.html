<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>iVision</title>
  <script>
    var DEFAULT = '/ivision-conf-7';
    var twa = window.Telegram && window.Telegram.WebApp;
    var sp = '';

    if(twa){
      twa.ready();
      twa.expand();
      sp = (twa.initDataUnsafe && twa.initDataUnsafe.start_param) || '';
    }

    // Dev-fallback: ?sp=ref_pgconf7_pid123_srcinsta
    if(!sp) sp = new URLSearchParams(window.location.search).get('sp') || '';

    // Карта страниц — редактировать здесь при добавлении новых страниц
    // (дублирует pages.json — для мгновенного редиректа без сетевого запроса)
    var PAGES = {
      "conf7": "/ivision-conf-7",
      "spkrs": "/ivision-for-speakers"
    };

    var dest = DEFAULT;
    sp.split('_').forEach(function(part){
      if(part.indexOf('pg') === 0){
        var code = part.slice(2);
        if(PAGES[code]) dest = PAGES[code];
      }
    });
    window.location.replace(dest);
  </script>
</head>
<body></body>
</html>
