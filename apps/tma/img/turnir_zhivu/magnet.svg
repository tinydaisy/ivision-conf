<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Магнит с сердцами и волнами притяжения -->

  <!-- Магнит (подкова) -->
  <g>
    <!-- Левый полюс (красный) -->
    <rect x="30" y="40" width="30" height="80" fill="#C84B9E" stroke="#FFCFA4" stroke-width="2" rx="3"/>

    <!-- Правый полюс (синий) -->
    <rect x="140" y="40" width="30" height="80" fill="#25455D" stroke="#FFCFA4" stroke-width="2" rx="3"/>

    <!-- Верхняя перемычка -->
    <rect x="50" y="35" width="100" height="20" fill="#C084FC" stroke="#FFCFA4" stroke-width="2" rx="3"/>
  </g>

  <!-- Волны притяжения -->
  <circle cx="155" cy="80" r="20" fill="none" stroke="#FFCFA4" stroke-width="1.5" opacity="0.7"/>
  <circle cx="155" cy="80" r="30" fill="none" stroke="#FFCFA4" stroke-width="1.5" opacity="0.5"/>
  <circle cx="45" cy="80" r="20" fill="none" stroke="#FFCFA4" stroke-width="1.5" opacity="0.7"/>
  <circle cx="45" cy="80" r="30" fill="none" stroke="#FFCFA4" stroke-width="1.5" opacity="0.5"/>

  <!-- Сердца (притягиваются) -->
  <g transform="translate(75, 140)">
    <!-- Левое сердце -->
    <path d="M -15,-5 Q -20,-10 -25,-5 Q -25,0 -15,8 Q -5,0 -5,-5 Q -5,-10 -10,-10 Q -15,-10 -15,-8"
          fill="#FFCFA4" stroke="#C084FC" stroke-width="1"/>
  </g>

  <g transform="translate(100, 145)">
    <!-- Центральное сердце -->
    <path d="M 0,-5 Q -5,-10 -10,-5 Q -10,0 0,8 Q 10,0 10,-5 Q 10,-10 5,-10 Q 0,-10 0,-8"
          fill="#FFCFA4" stroke="#C084FC" stroke-width="1"/>
  </g>

  <g transform="translate(125, 140)">
    <!-- Правое сердце -->
    <path d="M 15,-5 Q 10,-10 5,-5 Q 5,0 15,8 Q 25,0 25,-5 Q 25,-10 20,-10 Q 15,-10 15,-8"
          fill="#FFCFA4" stroke="#C084FC" stroke-width="1"/>
  </g>
</svg>
