<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Пазл из 4 элементов: 3 сложены вместе, 1 отодвинут в сторону -->
  <g stroke="#FFCFA4" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">

    <!-- Элемент 1: левый верхний - с правым выступом и нижним выступом -->
    <path d="M 30 30 H 80 C 80 38, 92 38, 92 50 C 92 62, 80 62, 80 70 V 90 H 65 C 65 102, 53 102, 53 90 H 30 Z"
          fill="#FFCFA4" fill-opacity="0.25"/>

    <!-- Элемент 2: правый верхний - с левой выемкой (стыкуется с элементом 1) -->
    <path d="M 92 50 C 92 38, 80 38, 80 30 H 150 V 90 H 130 C 130 102, 118 102, 118 90 H 80 V 70 C 80 62, 92 62, 92 50 Z"
          fill="#FFCFA4" fill-opacity="0.25"/>

    <!-- Элемент 3: левый нижний - с верхней выемкой (стыкуется с элементом 1) -->
    <path d="M 30 90 H 53 C 53 102, 65 102, 65 90 H 80 V 150 H 30 Z"
          fill="#FFCFA4" fill-opacity="0.25"/>

    <!-- Элемент 4: ОТОДВИНУТ в сторону (правее и ниже своего места) -->
    <g transform="translate(30 25)">
      <path d="M 100 115 C 100 103, 112 103, 112 115 H 160 V 175 H 100 Z"
            fill="#FFCFA4" fill-opacity="0.55"/>
    </g>

    <!-- Пунктирные линии: куда должен встать 4-й элемент -->
    <path d="M 80 90 H 150 V 150 H 80 Z"
          stroke="#FFCFA4" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.45" fill="none"/>

    <!-- Стрелка движения к месту -->
    <path d="M 135 155 L 122 145 M 135 155 L 135 140"
          stroke="#FFCFA4" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  </g>
</svg>
