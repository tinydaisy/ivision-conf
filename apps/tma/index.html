<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ВИДЕНИЕ / iViSiON-7</title>

  <!-- Редирект из браузера в мини-апп — до загрузки SDK -->
  <script>
    (function () {
      var sp = new URLSearchParams(window.location.search);
      var pid = sp.get('new_partner_id') || '';
      var src = sp.get('utm_source') || '';
      if (pid || src) {
        var parts = [];
        if (pid) parts.push(pid);
        if (src) parts.push(src);
        window.location.replace('https://t.me/Margo_forbs_bot/ivision?startapp=ref_' + parts.join('_'));
      }
    })();
  </script>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --peach:  #FFCFA4;
      --purple: #C084FC;
      --teal:   #25455D;
      --dark:   #080B12;
      --mid:    #0D111A;
      --card:   #111827;
      --text:   #F5F0E8;
      --muted:  rgba(245,240,232,.55);
      --dim:    rgba(245,240,232,.35);
      --border: rgba(255,207,164,.18);
      --r-md:   16px;
      --r-lg:   24px;
      --r-pill: 100px;
      --display: 'Bebas Neue', Impact, sans-serif;
      --body:    'Roboto', system-ui, sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--dark); color:var(--text); font-family:var(--body); font-size:15px; line-height:1.55; }

    .wrap  { max-width:480px; margin:0 auto; padding:0 20px; }
    .sec   { padding:52px 0; }
    .sec-alt { background:var(--mid); }

    .lbl {
      font-size:11px; font-weight:700; letter-spacing:.22em;
      text-transform:uppercase; color:var(--peach); margin-bottom:10px;
    }
    .h2 {
      font-family:var(--display);
      font-size:clamp(28px,8vw,42px);
      line-height:1; letter-spacing:.02em; margin-bottom:8px;
    }
    .sub { font-size:14px; color:var(--muted); line-height:1.6; margin-bottom:28px; }

    .pill {
      display:inline-block;
      background:rgba(255,207,164,.1); border:1px solid rgba(255,207,164,.25);
      color:var(--peach); border-radius:var(--r-pill);
      padding:4px 14px; font-size:12px; font-weight:600;
    }

    /* Buttons */
    .btn-p {
      display:block; width:100%; padding:16px 24px;
      background:var(--peach); color:#080B12;
      border:none; border-radius:var(--r-pill);
      font-family:var(--body); font-size:16px; font-weight:700;
      cursor:pointer; transition:opacity .15s,transform .1s; text-align:center;
    }
    .btn-p:active { opacity:.85; transform:scale(.98); }
    .btn-g {
      display:block; width:100%; padding:15px 24px;
      background:transparent; color:var(--peach);
      border:1px solid rgba(255,207,164,.35);
      border-radius:var(--r-pill);
      font-family:var(--body); font-size:16px; font-weight:700;
      cursor:pointer; transition:border-color .15s; text-align:center;
    }
    .btn-g:active { background:rgba(255,207,164,.08); }

    /* HERO */
    #hero {
      background:linear-gradient(160deg,#25455D 0%,#080B12 65%);
      padding:44px 0 52px; position:relative; overflow:hidden;
    }
    #hero::before {
      content:''; position:absolute; top:-60px; right:-60px;
      width:280px; height:280px;
      background:radial-gradient(circle,rgba(192,132,252,.14) 0%,transparent 70%);
      pointer-events:none;
    }
    .hero-name {
      font-family:var(--display);
      font-size:clamp(36px,11vw,56px);
      line-height:.95; letter-spacing:.02em; margin-bottom:4px;
    }
    .hero-name span { color:var(--peach); }
    .hero-sub-name {
      font-family:var(--display);
      font-size:clamp(16px,5vw,22px);
      color:var(--peach); letter-spacing:.04em; margin-bottom:14px;
    }
    .hero-tagline { font-size:14px; color:var(--muted); line-height:1.65; margin-bottom:20px; }
    .hero-meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
    .hero-meta-item {
      display:flex; align-items:center; gap:7px;
      font-size:13px; color:var(--muted);
    }
    .dot { width:6px; height:6px; border-radius:50%; background:var(--peach); flex-shrink:0; }
    .hero-seats {
      font-size:13px; color:var(--peach); font-weight:600; margin-bottom:24px;
    }
    .hero-greeting { font-size:13px; color:var(--dim); margin-top:12px; text-align:center; }

    /* Stats */
    .stats-row {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:10px; margin:28px 0 0;
    }
    .stat-card {
      background:rgba(255,207,164,.06); border:1px solid var(--border);
      border-radius:var(--r-md); padding:14px 10px; text-align:center;
    }
    .stat-val {
      font-family:var(--display); font-size:28px;
      color:var(--peach); letter-spacing:.03em; line-height:1;
    }
    .stat-lbl { font-size:11px; color:var(--muted); margin-top:4px; line-height:1.3; }

    /* Special features */
    .special-list { display:flex; flex-direction:column; gap:12px; margin-top:24px; }
    .special-item {
      display:flex; gap:14px; align-items:flex-start;
      background:rgba(17,24,39,.7); border:1px solid var(--border);
      border-radius:var(--r-md); padding:16px;
      backdrop-filter:blur(20px);
    }
    .special-icon { font-size:22px; flex-shrink:0; }
    .special-title { font-size:14px; font-weight:700; margin-bottom:3px; }
    .special-text  { font-size:13px; color:var(--muted); line-height:1.5; }

    /* Speakers */
    .speakers-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:12px; margin-top:24px;
    }
    .speaker-card {
      background:rgba(17,24,39,.7); border:1px solid var(--border);
      border-radius:var(--r-lg); backdrop-filter:blur(20px);
      padding:16px 14px; display:flex; flex-direction:column;
      align-items:center; text-align:center; gap:10px;
    }
    .speaker-photo {
      width:72px; height:72px; border-radius:50%;
      overflow:hidden; border:2px solid var(--border); flex-shrink:0;
    }
    .speaker-photo img { width:100%; height:100%; object-fit:cover; object-position:top; }
    .speaker-initials {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,var(--teal),var(--purple));
      color:#fff; font-family:var(--display); font-size:20px;
    }
    .speaker-role  { font-size:10px; color:var(--peach); font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
    .speaker-name  { font-size:13px; font-weight:700; line-height:1.2; }
    .speaker-creds { list-style:none; text-align:left; width:100%; }
    .speaker-creds li {
      font-size:11px; color:var(--muted); padding:3px 0;
      border-bottom:1px solid rgba(255,207,164,.06); line-height:1.4;
    }
    .speaker-creds li:last-child { border-bottom:none; }

    /* Benefits */
    .benefits-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:10px; margin-top:24px;
    }
    .benefit-card {
      background:rgba(17,24,39,.7); border:1px solid rgba(255,207,164,.1);
      border-radius:var(--r-md); padding:16px 13px;
      display:flex; flex-direction:column; gap:8px;
    }
    .benefit-icon  { font-size:24px; line-height:1; }
    .benefit-title { font-size:13px; font-weight:700; }
    .benefit-text  { font-size:12px; color:var(--muted); line-height:1.45; }

    /* Schedule */
    .sched-days { display:flex; flex-direction:column; gap:16px; margin-top:24px; }
    .sched-day  {
      background:rgba(17,24,39,.7); border:1px solid var(--border);
      border-radius:var(--r-lg); padding:20px;
    }
    .sched-day-name { font-family:var(--display); font-size:20px; color:var(--peach); letter-spacing:.04em; }
    .sched-day-date { font-size:12px; color:var(--muted); margin-bottom:14px; margin-top:2px; }
    .slot {
      display:flex; gap:12px; padding:9px 0;
      border-bottom:1px solid rgba(255,207,164,.06); align-items:flex-start;
    }
    .slot:last-child { border-bottom:none; }
    .slot-time  { font-size:11px; font-weight:700; color:var(--peach); min-width:54px; padding-top:1px; flex-shrink:0; }
    .slot-title { font-size:13px; line-height:1.4; }

    /* Tariffs */
    .tariffs-list { display:flex; flex-direction:column; gap:16px; margin-top:24px; }
    .tariff {
      background:rgba(17,24,39,.7); border:1px solid var(--border);
      border-radius:var(--r-lg); padding:24px 20px; position:relative;
    }
    .tariff.rec {
      border-color:transparent;
      background:linear-gradient(var(--card),var(--card)) padding-box,
                 linear-gradient(135deg,var(--peach),var(--purple)) border-box;
      box-shadow:0 0 48px rgba(200,75,158,.1);
    }
    .tariff-badge {
      position:absolute; top:-12px; left:50%; transform:translateX(-50%);
      background:linear-gradient(135deg,var(--peach),var(--purple));
      color:#080B12; font-size:11px; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase;
      padding:4px 16px; border-radius:var(--r-pill); white-space:nowrap;
    }
    .tariff-name  { font-family:var(--display); font-size:20px; letter-spacing:.04em; margin-bottom:4px; }
    .tariff-price { font-size:26px; font-weight:700; color:var(--peach); margin-bottom:6px; }
    .tariff-seats { font-size:12px; color:var(--muted); margin-bottom:18px; }
    .feature-list { list-style:none; margin-bottom:20px; }
    .feature-list li {
      font-size:13px; padding:7px 0;
      border-bottom:1px solid rgba(255,207,164,.06);
      display:flex; gap:9px; align-items:flex-start;
    }
    .feature-list li:last-child { border-bottom:none; }
    .feature-list li.yes::before { content:'✓'; color:var(--peach); flex-shrink:0; font-weight:700; }
    .feature-list li.no  { color:var(--dim); }
    .feature-list li.no::before  { content:'✗'; color:rgba(255,207,164,.25); flex-shrink:0; }

    /* Final CTA */
    #cta {
      background:linear-gradient(160deg,#25455D 0%,#080B12 65%);
      padding:52px 0; text-align:center;
    }

    /* GC Modal */
    #gc-modal {
      display:none; position:fixed; inset:0;
      background:rgba(8,11,18,.88); z-index:99999;
      align-items:flex-start; justify-content:center;
      overflow-y:auto; backdrop-filter:blur(6px);
    }
    .gc-inner {
      background:#16162a; border:1px solid rgba(255,207,164,.2);
      padding:48px 18px 28px; border-radius:var(--r-lg);
      width:92%; max-width:440px; position:relative; margin:36px auto;
    }
    .gc-close {
      position:absolute; top:10px; right:14px;
      background:none; border:none; color:#aaa; font-size:28px; cursor:pointer; line-height:1;
    }

    /* Access screen */
    #access {
      display:none; min-height:100vh;
      flex-direction:column; align-items:center; justify-content:center;
      text-align:center; gap:18px; padding:40px 24px;
      background:linear-gradient(160deg,#25455D 0%,#080B12 65%);
    }
    #access .ico { font-size:60px; }
    #access h2  { font-family:var(--display); font-size:34px; letter-spacing:.03em; }
    #access p   { font-size:14px; color:var(--muted); max-width:280px; line-height:1.6; }

    /* Loading */
    #loading {
      min-height:100vh; display:flex;
      align-items:center; justify-content:center;
      flex-direction:column; gap:14px;
    }
    .spin {
      width:34px; height:34px;
      border:3px solid rgba(255,207,164,.15);
      border-top-color:var(--peach); border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-txt { font-size:13px; color:var(--muted); }
  </style>
</head>
<body>

<div id="loading"><div class="spin"></div><div class="loading-txt">Загрузка…</div></div>
<div id="app" style="display:none"></div>
<div id="access">
  <div class="ico">🎉</div>
  <h2>Вы зарегистрированы!</h2>
  <p>Доступ к материалам конференции будет открыт совсем скоро. Мы пришлём уведомление.</p>
  <p id="access-name" style="font-size:13px;color:rgba(245,240,232,.35)"></p>
</div>

<!-- GC Modal -->
<div id="gc-modal" onclick="if(event.target===this)closeGC()">
  <div class="gc-inner">
    <button class="gc-close" onclick="closeGC()">×</button>
    <div id="gc-box"></div>
  </div>
</div>

<script>
  var tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();

  var DATA_URL      = './ivision-7.json';
  var activeScriptId = null;

  function openGC(id, src) {
    var box = document.getElementById('gc-box');
    if (activeScriptId !== id) {
      box.innerHTML = '';
      var s = document.createElement('script');
      s.id = id; s.src = src;
      box.appendChild(s);
      activeScriptId = id;
    }
    document.getElementById('gc-modal').style.display = 'flex';
  }
  function closeGC() { document.getElementById('gc-modal').style.display = 'none'; }

  var startParam = (tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
  var firstName  = tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name || '';

  if (startParam === 'free') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('access').style.display  = 'flex';
    if (firstName) document.getElementById('access-name').textContent = firstName + ', ждём тебя на конференции!';
  } else {
    fetch(DATA_URL)
      .then(function(r){ return r.json(); })
      .then(function(c){
        render(c);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display     = 'block';
      })
      .catch(function(){
        document.getElementById('loading').innerHTML =
          '<p style="color:var(--muted);text-align:center;padding:40px 20px">Не удалось загрузить.<br>Обнови страницу.</p>';
      });
  }

  function e(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function render(c) {
    /* Разбираем UTM из startParam */
    var utmTgId = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? String(tg.initDataUnsafe.user.id) : '';
    var t0 = c.tariffs[0], t1 = c.tariffs[1];
    var h = '';

    /* ── HERO ── */
    h += '<section id="hero"><div class="wrap">';
    h += '<div style="margin-bottom:14px"><span class="pill">' + e(c.hero_label) + '</span></div>';
    h += '<div class="hero-name">' + e(c.name).replace('/', '/ ') + '</div>';
    h += '<div class="hero-sub-name">' + e(c.name_sub) + '</div>';
    h += '<p class="hero-tagline">' + e(c.tagline) + '</p>';
    h += '<div class="hero-meta">';
    h += '<div class="hero-meta-item"><div class="dot"></div>' + e(c.dates) + '</div>';
    h += '<div class="hero-meta-item"><div class="dot"></div>' + e(c.format) + '</div>';
    h += '</div>';
    h += '<p class="hero-seats">🔥 Бесплатных мест: ' + e(c.capacity_free) + ' из ' + e(c.capacity_total) + '</p>';
    h += '<button class="btn-p" onclick="openGC(\'' + e(t0.gc_script_id) + '\',\'' + e(t0.gc_script_src) + '\')">Зарегистрироваться бесплатно</button>';
    if (firstName) h += '<p class="hero-greeting">Привет, ' + e(firstName) + '! 👋</p>';
    /* Stats */
    h += '<div class="stats-row">';
    c.stats.forEach(function(s){ h += '<div class="stat-card"><div class="stat-val">' + e(s.value) + '</div><div class="stat-lbl">' + e(s.label) + '</div></div>'; });
    h += '</div>';
    h += '</div></section>';

    /* ── ЧТО ДЕЛАЕТ КОНФЕРЕНЦИЮ ОСОБЕННОЙ ── */
    h += '<section class="sec sec-alt"><div class="wrap">';
    h += '<div class="lbl">Особенности</div>';
    h += '<div class="h2">Что делает<br>iViSiON особенной</div>';
    h += '<div class="special-list">';
    c.special.forEach(function(s){
      h += '<div class="special-item"><div class="special-icon">' + s.icon + '</div><div><div class="special-title">' + e(s.title) + '</div><div class="special-text">' + e(s.text) + '</div></div></div>';
    });
    h += '</div></div></section>';

    /* ── СПИКЕРЫ ── */
    h += '<section class="sec"><div class="wrap">';
    h += '<div class="lbl">Спикеры</div>';
    h += '<div class="h2">Эксперты<br>конференции</div>';
    h += '<div class="speakers-grid">';
    c.speakers.forEach(function(sp){
      h += '<div class="speaker-card">';
      h += '<div class="speaker-photo">';
      if (sp.photo_url) h += '<img src="' + e(sp.photo_url) + '" alt="' + e(sp.name) + '" loading="lazy">';
      else h += '<div class="speaker-initials">' + e(sp.initials) + '</div>';
      h += '</div>';
      h += '<div class="speaker-role">' + e(sp.role) + '</div>';
      h += '<div class="speaker-name">' + e(sp.name) + '</div>';
      h += '<ul class="speaker-creds">';
      sp.credentials.forEach(function(cr){ h += '<li>' + e(cr) + '</li>'; });
      h += '</ul></div>';
    });
    h += '</div></div></section>';

    /* ── ЧТО ТЫ ПОЛУЧИШЬ ── */
    h += '<section class="sec sec-alt"><div class="wrap">';
    h += '<div class="lbl">За 2 дня конференции</div>';
    h += '<div class="h2">Что ты<br>получишь</div>';
    h += '<div class="benefits-grid">';
    c.benefits.forEach(function(b){
      h += '<div class="benefit-card"><div class="benefit-icon">' + b.icon + '</div><div class="benefit-title">' + e(b.title) + '</div><div class="benefit-text">' + e(b.text) + '</div></div>';
    });
    h += '</div>';
    h += '<div style="margin-top:24px"><button class="btn-g" onclick="openGC(\'' + e(t0.gc_script_id) + '\',\'' + e(t0.gc_script_src) + '\')">Занять место на конференции</button></div>';
    h += '</div></section>';

    /* ── ПРОГРАММА ── */
    h += '<section class="sec"><div class="wrap">';
    h += '<div class="lbl">Расписание</div>';
    h += '<div class="h2">Программа</div>';
    h += '<div class="sched-days">';
    c.schedule.forEach(function(day){
      h += '<div class="sched-day">';
      h += '<div class="sched-day-name">' + e(day.day) + '</div>';
      h += '<div class="sched-day-date">' + e(day.date) + '</div>';
      day.slots.forEach(function(sl){
        h += '<div class="slot"><div class="slot-time">' + e(sl.time) + '</div><div class="slot-title">' + e(sl.title) + '</div></div>';
      });
      h += '</div>';
    });
    h += '</div></div></section>';

    /* ── ТАРИФЫ ── */
    h += '<section class="sec sec-alt"><div class="wrap">';
    h += '<div class="lbl">Варианты участия</div>';
    h += '<div class="h2">Тарифы</div>';
    h += '<div class="tariffs-list">';
    c.tariffs.forEach(function(t){
      h += '<div class="tariff' + (t.recommended ? ' rec' : '') + '">';
      if (t.recommended) h += '<div class="tariff-badge">Рекомендуется</div>';
      h += '<div class="tariff-name">' + e(t.name) + '</div>';
      h += '<div class="tariff-price">' + e(t.price_label) + '</div>';
      if (t.seats_left) h += '<div class="tariff-seats">' + e(t.seats_left) + '</div>';
      h += '<ul class="feature-list">';
      t.included.forEach(function(f){ h += '<li class="yes">' + e(f) + '</li>'; });
      t.not_included.forEach(function(f){ h += '<li class="no">' + e(f) + '</li>'; });
      h += '</ul>';
      h += '<button class="btn-p" onclick="openGC(\'' + e(t.gc_script_id) + '\',\'' + e(t.gc_script_src) + '\')">Выбрать тариф</button>';
      h += '</div>';
    });
    h += '</div></div></section>';

    /* ── FINAL CTA ── */
    h += '<section id="cta"><div class="wrap">';
    h += '<div class="lbl" style="text-align:center">Регистрация</div>';
    h += '<div class="h2" style="text-align:center">Твоё место<br>ждёт тебя</div>';
    h += '<p style="text-align:center;color:var(--muted);font-size:13px;margin:10px 0 24px">' + e(c.dates) + ' · ' + e(c.format) + '</p>';
    h += '<button class="btn-p" onclick="openGC(\'' + e(t0.gc_script_id) + '\',\'' + e(t0.gc_script_src) + '\')">Зарегистрироваться бесплатно</button>';
    h += '</div></section>';

    document.getElementById('app').innerHTML = h;
  }
</script>
</body>
</html>
