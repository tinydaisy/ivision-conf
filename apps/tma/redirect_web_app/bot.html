<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>iVision</title>
  <script src="/redirect_web_app/app_config.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    var DEFAULT = '/ivision-conf-7';
    var PAGES = {
      "conf7":   "/ivision-conf-7",
      "spkrs":   "/ivision-for-speakers",
      "ntwrk":   "/networking",
      "razbory": "/razbory-meet"
    };

    var twa    = window.Telegram && window.Telegram.WebApp;
    var sp     = '';
    var userId = '';

    if (twa) {
      twa.ready();
      twa.expand();
      sp     = (twa.initDataUnsafe && twa.initDataUnsafe.start_param) || '';
      userId = (twa.initDataUnsafe && twa.initDataUnsafe.user && String(twa.initDataUnsafe.user.id)) || '';
    }

    // Dev-fallback: ?sp=ref_pgconf7_pid123_srcinsta
    if (!sp) sp = new URLSearchParams(window.location.search).get('sp') || '';

    // Определяем страницу назначения по коду pg...
    var dest = DEFAULT;
    sp.split('_').forEach(function (part) {
      if (part.indexOf('pg') === 0) {
        var code = part.slice(2);
        if (PAGES[code]) dest = PAGES[code];
      }
    });

    // Отправляем event_start через наш бэкенд (сервер → Salebot, без CORS-блокировок).
    function sendSalebotEvent(uid) {
      if (!uid) return;
      try {
        fetch('/api/salebot-event', {
          method:    'POST',
          keepalive: true,
          headers:   { 'Content-Type': 'application/json' },
          body:      JSON.stringify({ user_id: uid, event: 'event_start' })
        });
      } catch (e) {}
    }

    function go() {
      sendSalebotEvent(userId);
      setTimeout(function () { window.location.replace(dest); }, 200);
    }

    // requestWriteAccess:
    //   новый пользователь  → показывает диалог «Разрешить боту писать сообщения»
    //   повторный           → тихо возвращает true, диалог не показывается
    if (twa && twa.requestWriteAccess) {
      twa.requestWriteAccess(function () { go(); });
    } else {
      // открыто в браузере (не в Telegram) — редиректим сразу
      go();
    }
  </script>
</head>
<body></body>
</html>
