<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iVision Conf</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: #1c1c1e; height: 100vh; overflow: hidden; }

    #loading {
      position: fixed; inset: 0;
      background: #1c1c1e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 10;
      transition: opacity 0.3s;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 15px; opacity: 0.6; }

    /* Резервная кнопка — показывается если iframe не загрузился */
    #fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #fallback p { opacity: 0.5; font-size: 13px; max-width: 260px; line-height: 1.5; }
    #open-btn {
      padding: 14px 32px;
      background: #6c63ff;
      color: #fff;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600;
      cursor: pointer;
    }

    #frame {
      width: 100%; height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p>Открываем iVision Conf…</p>
    <div id="fallback">
      <p>Не удалось открыть внутри.<br>Нажми кнопку — откроется в Telegram.</p>
      <button id="open-btn">Открыть iVision Conf</button>
    </div>
  </div>

  <iframe id="frame" src="about:blank" allow="payment" sandbox="allow-scripts allow-forms allow-same-origin allow-top-navigation allow-popups"></iframe>

  <script>
    const BOT_APP_LINK = "https://t.me/Margo_forbs_bot/ivision";
    const LANDING      = "https://medialift.margoforbs.ru/ivision-conf-7";

    function parseStartParam(payload) {
      if (!payload || !payload.startsWith("ref_")) return {};
      const parts = payload.slice(4).split("_", 2);
      const result = {};
      if (parts[0]) result.new_partner_id = parts[0];
      if (parts[1]) result.utm_source     = parts[1];
      return result;
    }

    const tg = window.Telegram.WebApp;

    // ── Внутри Telegram (мини-апп) ───────────────────────────────────────
    if (tg.initData) {
      tg.ready();
      tg.expand();

      const sp = new URLSearchParams(window.location.search);
      let new_partner_id = sp.get("new_partner_id") || "";
      let utm_source     = sp.get("utm_source")     || "";
      const tg_id        = String(tg.initDataUnsafe?.user?.id || sp.get("tg_id") || "");

      const startParam = tg.initDataUnsafe?.start_param || "";
      if (startParam) {
        const parsed = parseStartParam(startParam);
        if (parsed.new_partner_id) new_partner_id = parsed.new_partner_id;
        if (parsed.utm_source)     utm_source     = parsed.utm_source;
      }

      const params = {};
      if (new_partner_id) params.new_partner_id = new_partner_id;
      if (utm_source)     params.utm_source     = utm_source;
      if (tg_id)          params.tg_id          = tg_id;

      const query = new URLSearchParams(params).toString();
      const url   = query ? `${LANDING}?${query}` : LANDING;

      const frame   = document.getElementById("frame");
      const loading = document.getElementById("loading");

      // Пробуем загрузить GetCourse в iframe
      frame.src = url;

      frame.addEventListener("load", () => {
        // iframe загрузился — скрываем спиннер
        loading.style.opacity = "0";
        setTimeout(() => loading.style.display = "none", 300);
      });

      // Если через 5 сек iframe всё ещё не показал контент —
      // показываем резервную кнопку (значит GetCourse блокирует iframe)
      setTimeout(() => {
        if (loading.style.display !== "none") {
          document.querySelector(".spinner").style.display = "none";
          document.querySelector("#loading > p").style.display = "none";
          document.getElementById("fallback").style.display = "flex";
          document.getElementById("open-btn").onclick = () => tg.openLink(url);
        }
      }, 5000);

    // ── В обычном браузере → редирект в мини-апп ─────────────────────────
    } else {
      const sp             = new URLSearchParams(window.location.search);
      const new_partner_id = sp.get("new_partner_id") || "";
      const utm_source     = sp.get("utm_source")     || "";

      const parts    = [];
      if (new_partner_id) parts.push(new_partner_id);
      if (utm_source)     parts.push(utm_source);
      const startapp = parts.length ? "ref_" + parts.join("_") : "";

      window.location.href = startapp
        ? `${BOT_APP_LINK}?startapp=${startapp}`
        : BOT_APP_LINK;
    }
  </script>
</body>
</html>
