<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iVision Conf</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--tg-theme-bg-color, #1c1c1e);
      color: var(--tg-theme-text-color, #fff);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--tg-theme-button-color, #6c63ff);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 15px; opacity: 0.6; }
    .btn {
      display: none;
      margin-top: 8px;
      padding: 14px 28px;
      background: var(--tg-theme-button-color, #6c63ff);
      color: var(--tg-theme-button-text-color, #fff);
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Открываем iVision Conf…</p>
  <button class="btn" id="btn">Открыть вручную</button>

  <script>
    const BOT_USERNAME = "margo_forbs_bot";
    const LANDING      = "https://medialift.margoforbs.ru/ivision-conf-7";

    const sp             = new URLSearchParams(window.location.search);
    const new_partner_id = sp.get("new_partner_id") || "";
    const utm_source     = sp.get("utm_source")     || "";
    const tg_id          = sp.get("tg_id")          || "";

    const tg = window.Telegram.WebApp;

    // ── Внутри Telegram (мини-апп) ────────────────────────────────────────
    if (tg.initData) {
      tg.ready();
      tg.expand();

      const params = {};
      if (new_partner_id) params.new_partner_id = new_partner_id;
      if (utm_source)     params.utm_source     = utm_source;
      if (tg_id)          params.tg_id          = tg_id;

      const query = new URLSearchParams(params).toString();
      const url   = query ? `${LANDING}?${query}` : LANDING;

      // Открывает в Telegram-браузере (шторка поверх чата, не Safari/Chrome)
      tg.openLink(url);

      // Резервная кнопка если что-то пошло не так
      setTimeout(() => {
        document.getElementById("btn").style.display = "block";
        document.getElementById("btn").onclick = () => tg.openLink(url);
      }, 3000);

    // ── В обычном браузере (по ссылке из Instagram / рекламы) ────────────
    } else {
      const parts = [];
      if (new_partner_id) parts.push(new_partner_id);
      if (utm_source)     parts.push(utm_source);
      const startParam = parts.length ? "ref_" + parts.join("_") : "";
      const botUrl = startParam
        ? `https://t.me/${BOT_USERNAME}?start=${startParam}`
        : `https://t.me/${BOT_USERNAME}`;
      window.location.href = botUrl;
    }
  </script>
</body>
</html>
