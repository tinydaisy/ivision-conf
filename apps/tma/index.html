<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iVision Conf</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--tg-theme-bg-color, #1c1c1e);
      color: var(--tg-theme-text-color, #fff);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--tg-theme-button-color, #6c63ff);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 15px; opacity: 0.6; }
    .btn {
      display: none;
      margin-top: 8px;
      padding: 14px 28px;
      background: var(--tg-theme-button-color, #6c63ff);
      color: var(--tg-theme-button-text-color, #fff);
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Открываем iVision Conf…</p>
  <button class="btn" id="btn">Открыть вручную</button>

  <script>
    const BOT_APP_LINK = "https://t.me/Margo_forbs_bot/ivision";
    const LANDING      = "https://medialift.margoforbs.ru/ivision-conf-7";

    // Разбирает "ref_5725111966_insta" → {new_partner_id, utm_source}
    function parseStartParam(payload) {
      if (!payload || !payload.startsWith("ref_")) return {};
      const parts = payload.slice(4).split("_", 2);
      const result = {};
      if (parts[0]) result.new_partner_id = parts[0];
      if (parts[1]) result.utm_source     = parts[1];
      return result;
    }

    const tg = window.Telegram.WebApp;

    // ── Внутри Telegram (мини-апп открылся через startapp или WebApp кнопку) ──
    if (tg.initData) {
      tg.ready();
      tg.expand();

      // Параметры могут прийти двумя путями:
      // 1. Через startapp: tg.initDataUnsafe.start_param = "ref_5725111966_insta"
      // 2. Через URL (WebApp кнопка бота): ?new_partner_id=...&utm_source=...
      const sp = new URLSearchParams(window.location.search);

      let new_partner_id = sp.get("new_partner_id") || "";
      let utm_source     = sp.get("utm_source")     || "";
      const tg_id        = sp.get("tg_id") || String(tg.initDataUnsafe?.user?.id || "");

      // startapp перекрывает URL-параметры если они есть
      const startParam = tg.initDataUnsafe?.start_param || "";
      if (startParam) {
        const parsed = parseStartParam(startParam);
        if (parsed.new_partner_id) new_partner_id = parsed.new_partner_id;
        if (parsed.utm_source)     utm_source     = parsed.utm_source;
      }

      const params = {};
      if (new_partner_id) params.new_partner_id = new_partner_id;
      if (utm_source)     params.utm_source     = utm_source;
      if (tg_id)          params.tg_id          = tg_id;

      const query = new URLSearchParams(params).toString();
      const url   = query ? `${LANDING}?${query}` : LANDING;

      // Открываем GetCourse прямо в WebView мини-апп (не внешний браузер)
      window.location.replace(url);

      // Резервная кнопка через 4 сек если что-то пошло не так
      setTimeout(() => {
        document.getElementById("btn").style.display = "block";
        document.getElementById("btn").onclick = () => window.location.replace(url);
      }, 4000);

    // ── В обычном браузере (ссылка из Instagram / рекламы) ────────────────
    // Редиректим на мини-апп — откроется сразу, без кнопок в боте
    } else {
      const sp             = new URLSearchParams(window.location.search);
      const new_partner_id = sp.get("new_partner_id") || "";
      const utm_source     = sp.get("utm_source")     || "";

      const parts = [];
      if (new_partner_id) parts.push(new_partner_id);
      if (utm_source)     parts.push(utm_source);
      const startapp = parts.length ? "ref_" + parts.join("_") : "";

      const url = startapp
        ? `${BOT_APP_LINK}?startapp=${startapp}`
        : BOT_APP_LINK;

      window.location.href = url;
    }
  </script>
</body>
</html>
