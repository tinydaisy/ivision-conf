<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iVision Conf</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const LANDING = "https://medialift.margoforbs.ru/ivision-conf-7";

    // Читаем UTM-параметры, которые бот передал в URL этой страницы
    const sp = new URLSearchParams(window.location.search);

    const params = {};
    if (sp.get("new_partner_id")) params.new_partner_id = sp.get("new_partner_id");
    if (sp.get("utm_source"))     params.utm_source     = sp.get("utm_source");
    if (sp.get("tg_id"))          params.tg_id          = sp.get("tg_id");

    const query = new URLSearchParams(params).toString();
    const url   = query ? `${LANDING}?${query}` : LANDING;

    // Открываем лендинг внутри Telegram (встроенный браузер)
    tg.openLink(url);
  </script>
</body>
</html>
