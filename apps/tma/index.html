<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>ВИДЕНИЕ / iViSiON-7</title>
  <script>
    (function(){
      var sp=new URLSearchParams(window.location.search);
      var pid=sp.get('new_partner_id')||'',src=sp.get('utm_source')||'';
      if(pid||src){var p=[];if(pid)p.push(pid);if(src)p.push(src);window.location.replace('https://t.me/Margo_forbs_bot/ivision?startapp=ref_'+p.join('_'));}
    })();
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --peach:#FFCFA4;--purple:#C084FC;--teal:#25455D;--pink:#C84B9E;
      --dark:#080B12;--mid:#0D111A;--card:#111827;
      --text:#F5F0E8;--muted:rgba(245,240,232,.55);--dim:rgba(245,240,232,.32);
      --border:rgba(255,207,164,.18);
      --btn-grad:linear-gradient(135deg,#FFCFA4 0%,#C084FC 50%,#25455D 100%);
      --r-md:16px;--r-lg:24px;--r-pill:100px;
      --ff-d:'Bebas Neue',Impact,sans-serif;
      --ff-b:'Roboto',system-ui,sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--dark);color:var(--text);font-family:var(--ff-b);font-size:15px;line-height:1.55;}
    .w{max-width:480px;margin:0 auto;padding:0 20px;}
    .sec{padding:52px 0;}
    .sa{background:var(--mid);}
    .lbl{font-family:var(--ff-d);font-size:13px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:var(--peach);margin-bottom:10px;}
    .h2{font-family:var(--ff-d);font-size:clamp(28px,8vw,42px);line-height:1;letter-spacing:.02em;margin-bottom:8px;}
    h3{font-family:var(--ff-d);font-size:clamp(20px,5vw,28px);letter-spacing:.02em;}
    .sub{font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:24px;}
    .pill-tag{display:inline-flex;align-items:center;background:rgba(255,207,164,.08);border:1px solid rgba(255,207,164,.3);color:var(--peach);border-radius:var(--r-pill);padding:5px 14px;font-size:12px;font-weight:600;font-family:var(--ff-b);}

    /* ── THICK GRADIENT BORDER BUTTON (dns_stupen1 style) ── */
    .bgw{display:block;width:100%;padding:3px;border-radius:var(--r-pill);background:var(--btn-grad);cursor:pointer;border:none;transition:transform .15s,opacity .15s;}
    .bgw:active{transform:scale(.98);opacity:.9;}
    .bgi{display:flex;align-items:center;justify-content:center;background:var(--dark);color:var(--text);font-family:var(--ff-d);font-weight:400;font-size:17px;letter-spacing:.06em;padding:14px 20px;border-radius:var(--r-pill);text-align:center;width:100%;border:none;cursor:pointer;}
    .bgw:active .bgi{background:rgba(8,11,18,.8);}
    /* Filled gradient button (payment) */
    .bpay{display:block;width:100%;padding:3px;border-radius:var(--r-pill);background:var(--btn-grad);cursor:pointer;border:none;transition:transform .15s;}
    .bpay:active{transform:scale(.98);}
    .bpay-i{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(255,207,164,.15),rgba(192,132,252,.15));color:var(--text);font-family:var(--ff-d);font-size:17px;letter-spacing:.06em;padding:14px 20px;border-radius:var(--r-pill);text-align:center;width:100%;}

    /* ── STICKY NAV ── */
    #nav{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-120px);z-index:1000;width:calc(100% - 24px);max-width:480px;background:rgba(8,11,18,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(37,69,93,.55);border-radius:var(--r-pill);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:transform .4s ease;}
    #nav.vis{transform:translateX(-50%) translateY(0);}
    .nav-logos{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .nav-logo-conf{font-family:var(--ff-d);font-size:13px;letter-spacing:.04em;color:var(--text);white-space:nowrap;line-height:1;}
    .nav-logo-conf span{color:var(--peach);}
    .nav-opora{height:26px;width:auto;object-fit:contain;border-radius:4px;}
    .nav-links{display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .nav-links a{font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;white-space:nowrap;letter-spacing:.04em;}
    .nav-links a:active{color:var(--peach);}
    .nav-btn{flex-shrink:0;padding:2px;border-radius:var(--r-pill);background:var(--btn-grad);border:none;cursor:pointer;}
    .nav-btn-i{display:flex;align-items:center;background:var(--dark);color:var(--text);font-family:var(--ff-d);font-size:12px;letter-spacing:.04em;padding:6px 12px;border-radius:var(--r-pill);white-space:nowrap;}

    /* ── SEATS BADGE (floating) ── */
    #seats-badge{position:fixed;bottom:80px;right:10px;background:rgba(8,11,18,.95);border:1.5px solid var(--peach);box-shadow:0 0 16px rgba(255,207,164,.3),0 0 36px rgba(255,207,164,.1);border-radius:12px;padding:9px 11px;text-align:center;z-index:500;backdrop-filter:blur(10px);display:none;}
    .sb-lbl{font-family:var(--ff-d);font-size:9px;letter-spacing:.14em;color:var(--peach);line-height:1.2;}
    .sb-row{display:flex;align-items:baseline;justify-content:center;gap:2px;margin-top:2px;}
    .sb-free{font-family:var(--ff-d);font-size:18px;color:var(--pink);line-height:1;}
    .sb-sep{font-size:13px;color:var(--muted);}
    .sb-total{font-family:var(--ff-d);font-size:13px;color:var(--text);line-height:1;}

    /* ── HERO ── */
    #hero{position:relative;padding:52px 0 44px;overflow:hidden;background:#080B12;}
    /* Microphone background SVG */
    #hero-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
    #hero-bg svg{position:absolute;right:-10%;top:10%;opacity:.06;width:70%;max-width:280px;}
    /* Dark gradient overlay */
    #hero::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(37,69,93,.55) 0%,rgba(8,11,18,.95) 70%);z-index:1;}
    #hero .w{position:relative;z-index:2;}
    /* Logos at very top of hero */
    .hero-top-logos{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
    .hero-logo-conf{font-family:var(--ff-d);font-size:18px;letter-spacing:.04em;color:var(--text);}
    .hero-logo-conf span{color:var(--peach);}
    .hero-opora{height:32px;width:auto;object-fit:contain;border-radius:6px;}
    /* Date/format oval badges */
    .hero-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
    /* Organizer label */
    .h-org{font-family:var(--ff-d);font-size:13px;letter-spacing:.18em;color:var(--muted);margin-bottom:4px;}
    /* Conference name small */
    .h-conf{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px;}
    /* Big subtitle */
    .h-name-big{font-family:var(--ff-d);font-size:clamp(34px,10vw,52px);line-height:.95;letter-spacing:.02em;color:var(--text);margin-bottom:14px;}
    .h-tagline{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:20px;}
    /* Seats row under button */
    .h-seats-row{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-top:14px;margin-bottom:18px;}
    .h-seats-label{font-size:12px;color:var(--muted);}
    .h-seats-free{font-family:var(--ff-d);font-size:22px;color:var(--pink);line-height:1;}
    .h-seats-sep{font-size:14px;color:var(--muted);}
    .h-seats-total{font-family:var(--ff-d);font-size:20px;color:var(--text);line-height:1;}
    /* Gifts label */
    .gifts-label{font-family:var(--ff-d);font-size:15px;letter-spacing:.1em;color:var(--peach);margin-bottom:10px;}
    /* Hero mini gift list */
    .h-gifts{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;}
    .h-gift{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--muted);line-height:1.4;}
    .h-gift-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);flex-shrink:0;margin-top:4px;}
    /* Countdown */
    .countdown{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:0;}
    .cd-block{text-align:center;background:rgba(255,207,164,.06);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;min-width:58px;}
    .cd-num{font-family:var(--ff-d);font-size:28px;color:var(--peach);line-height:1;display:block;}
    .cd-lbl{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
    .cd-sep{font-family:var(--ff-d);font-size:26px;color:var(--peach);opacity:.5;align-self:flex-start;padding-top:8px;}
    .cd-title{font-family:var(--ff-d);font-size:13px;letter-spacing:.12em;color:var(--muted);text-align:center;margin-bottom:10px;}

    /* ── MARQUEE ── */
    #marquee-sec{background:var(--peach);overflow:hidden;padding:0;}
    .mq-track{display:flex;height:42px;align-items:center;overflow:hidden;}
    .mq-inner{display:flex;white-space:nowrap;animation:mqleft 28s linear infinite;}
    .mq-item{font-family:var(--ff-b);font-weight:700;font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--dark);padding:0 20px;}
    .mq-dot{opacity:.35;padding:0 3px;}
    @keyframes mqleft{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    /* ── MISSION ── */
    .mission-body{background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;margin-top:24px;}
    .mission-intro{font-size:15px;font-weight:600;color:var(--peach);margin-bottom:14px;line-height:1.5;}
    .slogan-frame{background:linear-gradient(var(--dark),var(--dark)) padding-box,linear-gradient(135deg,var(--pink),var(--peach)) border-box;border:2px solid transparent;border-radius:var(--r-md);padding:18px 20px;text-align:center;color:#fff;font-family:var(--ff-d);font-size:clamp(18px,5vw,24px);letter-spacing:.06em;line-height:1.3;margin:16px 0;}
    .mission-photo{width:100%;border-radius:var(--r-md);margin:16px 0;object-fit:cover;max-height:280px;}
    .mission-text{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:14px;}
    .mission-footer{font-size:13px;color:var(--dim);line-height:1.6;font-style:italic;border-left:3px solid var(--peach);padding-left:14px;}

    /* ── GIFTS 3-COLUMN (mid site) ── */
    .gifts3-title{font-family:var(--ff-d);font-size:clamp(20px,6vw,28px);margin-bottom:6px;}
    .gifts3-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
    .gifts3-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .gift3-card{background:rgba(17,24,39,.8);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;position:relative;overflow:hidden;}
    .gift3-img{width:100%;height:80px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(255,207,164,.04);margin-bottom:2px;}
    .gift3-num{font-family:var(--ff-d);font-size:28px;color:rgba(255,207,164,.15);position:absolute;top:8px;left:10px;line-height:1;}
    .gift3-text{font-size:10px;color:var(--muted);line-height:1.4;}
    /* Pink ribbon bottom-right */
    .gift3-card.ribbon::after{content:'🎀';position:absolute;bottom:6px;right:6px;font-size:16px;}
    .gift3-card.ribbon::before{content:'';position:absolute;bottom:0;right:0;width:40px;height:40px;background:linear-gradient(135deg,transparent 50%,rgba(200,75,158,.3) 50%);border-radius:0;}

    /* ── SPACES ── */
    .spaces-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px;}
    .space-card{background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 14px;}
    .sp-head{font-family:var(--ff-d);font-size:16px;color:var(--peach);letter-spacing:.04em;margin-bottom:6px;}
    .sp-text{font-size:12px;color:var(--muted);line-height:1.5;}
    .quote-block{background:linear-gradient(135deg,rgba(37,69,93,.4),rgba(192,132,252,.15));border:1px solid rgba(192,132,252,.25);border-radius:var(--r-lg);padding:24px;margin-top:20px;text-align:center;}
    .quote-text{font-family:var(--ff-d);font-size:clamp(18px,5vw,24px);line-height:1.3;letter-spacing:.03em;}

    /* ── SPECIAL (SVG icons in peach) ── */
    .special-list{display:flex;flex-direction:column;gap:10px;margin-top:24px;}
    .sp-item{display:flex;gap:14px;align-items:flex-start;background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;}
    .sp-ico{width:36px;height:36px;flex-shrink:0;color:var(--peach);}
    .sp-ico svg{width:100%;height:100%;}
    .sp-title{font-family:var(--ff-d);font-size:16px;letter-spacing:.04em;margin-bottom:3px;}
    .sp-desc{font-size:12px;color:var(--muted);line-height:1.5;}

    /* ── STATS SECTION ── */
    .stats4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:24px;}
    .st4{background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 14px;text-align:center;}
    .sv4{font-family:var(--ff-d);font-size:clamp(42px,11vw,58px);color:var(--peach);line-height:1;}
    .sl4{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.3;}

    /* ── SPEAKERS ── */
    .spk-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px;}
    .spk-card{background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;}
    .spk-photo{width:76px;height:76px;border-radius:50%;overflow:hidden;border:2px solid var(--border);flex-shrink:0;}
    .spk-photo img{width:100%;height:100%;object-fit:cover;object-position:top;}
    .spk-init{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--teal),var(--purple));color:#fff;font-family:var(--ff-d);font-size:22px;}
    .spk-role{font-size:10px;color:var(--peach);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
    .spk-name{font-family:var(--ff-d);font-size:16px;letter-spacing:.03em;line-height:1.1;}
    .spk-creds{list-style:none;text-align:left;width:100%;}
    .spk-creds li{font-size:11px;color:var(--muted);padding:3px 0;border-bottom:1px solid rgba(255,207,164,.06);line-height:1.4;}
    .spk-creds li:last-child{border-bottom:none;}

    /* ── BENEFITS ── */
    .ben-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px;}
    .ben-card{background:rgba(17,24,39,.7);border:1px solid rgba(255,207,164,.1);border-radius:var(--r-md);padding:16px 13px;display:flex;flex-direction:column;gap:7px;}
    .ben-ico{font-size:24px;line-height:1;}
    .ben-title{font-family:var(--ff-d);font-size:16px;letter-spacing:.03em;}
    .ben-text{font-size:12px;color:var(--muted);line-height:1.45;}

    /* ── SCHEDULE ── */
    .sched{display:flex;flex-direction:column;gap:14px;margin-top:24px;}
    .sched-day{background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;}
    .sd-name{font-family:var(--ff-d);font-size:20px;color:var(--peach);letter-spacing:.04em;}
    .sd-date{font-size:11px;color:var(--muted);margin-bottom:14px;margin-top:2px;}
    .slot{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,207,164,.06);align-items:flex-start;}
    .slot:last-child{border-bottom:none;}
    .sl-time{font-size:11px;font-weight:700;color:var(--peach);min-width:56px;padding-top:1px;flex-shrink:0;}
    .sl-title{font-size:13px;line-height:1.4;}

    /* ── TARIFFS ── */
    .tariffs{display:flex;flex-direction:column;gap:16px;margin-top:24px;}
    .tariff{background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 20px;position:relative;}
    .tariff.rec{border-color:transparent;background:linear-gradient(var(--card),var(--card)) padding-box,linear-gradient(135deg,var(--peach),var(--purple)) border-box;box-shadow:0 0 48px rgba(200,75,158,.1);}
    .t-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--peach),var(--purple));color:#080B12;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 16px;border-radius:var(--r-pill);white-space:nowrap;}
    .t-name{font-family:var(--ff-d);font-size:22px;letter-spacing:.04em;margin-bottom:4px;}
    .t-price{font-size:28px;font-weight:700;color:var(--peach);margin-bottom:5px;font-family:var(--ff-d);}
    .t-seats{font-size:12px;color:var(--muted);margin-bottom:16px;}
    .feat{list-style:none;margin-bottom:20px;}
    .feat li{font-size:13px;padding:7px 0;border-bottom:1px solid rgba(255,207,164,.06);display:flex;gap:9px;align-items:flex-start;line-height:1.45;}
    .feat li:last-child{border-bottom:none;}
    .feat li.y::before{content:'✓';color:var(--peach);flex-shrink:0;font-weight:700;}
    .feat li.n{color:var(--dim);}
    .feat li.n::before{content:'✗';color:rgba(255,207,164,.22);flex-shrink:0;}

    /* ── ОПОРА РОССИЯ ── */
    #opora{background:var(--mid);padding:36px 0;}
    .opora-box{display:flex;align-items:center;gap:16px;background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 18px;}
    .opora-img{height:52px;width:auto;object-fit:contain;border-radius:8px;flex-shrink:0;}
    .opora-title{font-family:var(--ff-d);font-size:16px;letter-spacing:.04em;color:var(--peach);margin-bottom:4px;}
    .opora-text{font-size:12px;color:var(--muted);line-height:1.5;}

    /* ── FINAL CTA ── */
    #cta{background:linear-gradient(160deg,#25455D 0%,#080B12 65%);padding:52px 0;text-align:center;}

    /* ── GC MODALS (pre-embedded, dns_stupen1 style) ── */
    .gc-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:99999;align-items:flex-start;justify-content:center;overflow-y:auto;}
    .gc-box{background:#16162a;border:1px solid rgba(255,207,164,.2);padding:48px 18px 28px;border-radius:var(--r-lg);max-width:480px;width:92%;position:relative;margin:40px auto;}
    .gc-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#aaa;font-size:30px;cursor:pointer;line-height:1;}

    /* ── ACCESS ── */
    #access{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:40px 24px;background:linear-gradient(160deg,#25455D 0%,#080B12 65%);}
    #access .ico{font-size:60px;}
    #access h2{font-family:var(--ff-d);font-size:34px;letter-spacing:.03em;}
    #access p{font-size:14px;color:var(--muted);max-width:280px;line-height:1.6;}

    /* ── LOADING ── */
    #loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
    .spin{width:34px;height:34px;border:3px solid rgba(255,207,164,.15);border-top-color:var(--peach);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-txt{font-size:13px;color:var(--muted);}
  </style>
</head>
<body>

<!-- ── STICKY NAV ── -->
<nav id="nav">
  <div class="nav-logos">
    <img src="/img/opora.png" alt="Опора России" class="nav-opora">
    <div class="nav-logo-conf">ВИДЕНИЕ<span>/iViSiON</span></div>
  </div>
  <div class="nav-links">
    <a href="#" data-nav="tariffs-sec">Тарифы</a>
    <a href="#" data-nav="program-sec">Программа</a>
    <a href="#" data-nav="speakers-sec">Спикеры</a>
  </div>
  <button class="nav-btn" id="nav-cta-btn">
    <span class="nav-btn-i">Тариф</span>
  </button>
</nav>

<!-- ── FLOATING SEATS BADGE ── -->
<div id="seats-badge">
  <div class="sb-lbl">Осталось мест</div>
  <div class="sb-row">

function updateCountdown(){
  var target=new Date('2026-04-23T09:00:00+03:00');

  if(diff<=0){
    var el=document.getElementById('countdown');

    return;
  }
  var d=Math.floor(diff/86400000);
  var h=Math.floor((diff%86400000)/3600000);
  var m=Math.floor((diff%3600000)/60000);
  var s=Math.floor((diff%60000)/1000);

}

/* ── COUNTER ANIMATION ── */
function animateCounter(el,target,suffix,dur){
  var start=0,step=target/(dur/16);
  (function tick(){
    start+=step;if(start>=target){el.textContent=target+suffix;return;}
    el.textContent=Math.floor(start)+suffix;requestAnimationFrame(tick);
  })();
}
var countersStarted=false;
function watchCounters(){
  var el=document.querySelector('.stats4');if(!el)return;
  var obs=new IntersectionObserver(function(entries){
    if(entries[0].isIntersecting&&!countersStarted){
      countersStarted=true;
      document.querySelectorAll('[data-count]').forEach(function(el){
        animateCounter(el,parseInt(el.dataset.count,10),el.dataset.suffix||'',1200);
      });
    }
  },{threshold:.3});

}

    t.included.forEach(function(f){h+='<li class="y">'+e(f)+'</li>';});
    t.not_included.forEach(function(f){h+='<li class="n">'+e(f)+'</li>';});
    h+='</ul>';
    h+=payBtn('ВЫБРАТЬ',modals[i]);
    h+='</div>';
  });
  h+='</div></div></section>';

  /* ── 11. ОПОРА РОССИЯ ── */
  h+='<section id="opora"><div class="w">';
  h+='<div class="opora-box">';
  h+='<img src="/img/opora.png" alt="Опора России" class="opora-img">';
  h+='<div>';
  h+='<div class="opora-title">Член «Опора России»</div>';
  h+='<div class="opora-text">Марго Форбс — зам. председателя комитета по личному бренду БРО «Опора России». Конференция реализуется при поддержке предпринимательского сообщества.</div>';
  h+='</div></div></div></section>';

  /* ── 12. FINAL CTA ── */
  h+='<section id="cta"><div class="w">';
  h+='<div class="lbl" style="text-align:center">Регистрация</div>';
  h+='<div class="h2" style="text-align:center">Твоё место<br>ждёт тебя</div>';
  h+='<p style="text-align:center;color:var(--muted);font-size:13px;margin:10px 0 24px">'+e(c.dates)+' · Онлайн</p>';
  h+=scrollBtn('Зарегистрироваться бесплатно');
  h+='</div></section>';

  document.getElementById('app').innerHTML=h;
}
</script>
</body>
</html>
