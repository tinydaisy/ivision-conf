<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Онлайн-конференция «Видение / iViSiON»</title>
  <link rel="icon" type="image/png" href="/img/logo_ivision.png">
  <script>var PAGE_CODE = 'conf7';</script>
  <script src="/redirect_web_app/app_config.js"></script>
  <script src="/redirect_web_app/redirect_web_app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;600;700&display=swap');
    :root{
      --peach:#FFCFA4;--purple:#C084FC;--teal:#25455D;--pink:#C84B9E;
      --dark:#080B12;--mid:#0D111A;--card:#111827;
      --text:#F5F0E8;--muted:rgba(245,240,232,.55);--dim:rgba(245,240,232,.32);
      --border:rgba(255,207,164,.18);
      --btn-grad:linear-gradient(135deg,#FFCFA4 0%,#C084FC 50%,#25455D 100%);
      --r-md:16px;--r-lg:24px;--r-pill:100px;
      --ff-d:'Bebas Neue','Roboto',sans-serif;
      --ff-b:'Roboto',system-ui,sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;overflow-x:hidden;}
    body{background:var(--dark);color:var(--text);font-family:var(--ff-b);font-size:15px;line-height:1.55;overflow-x:hidden;}
    .w{max-width:480px;margin:0 auto;padding:0 20px;}
    .sec{padding:52px 0;}
    .sa{background:var(--mid);}
    /* ── SHARED DISPLAY FONT — Roboto Bold Uppercase (Bebas Neue has no Cyrillic → mixed rendering) ── */
    .bebas,.lbl,.h2,.h-name-big,.gifts-label,.slogan-frame,.sd-name,.sp-head,.sp-title,
    .t-name,.t-price,.ben-title,.spk-name,.sv4,.quote-text,.h-seats-free,.h-seats-total{
      font-family:'Roboto',sans-serif !important;
      font-weight:700;
      text-transform:uppercase;
    }
    .lbl{font-size:13px;letter-spacing:.18em;color:var(--peach);margin-bottom:10px;}
    .h2{font-size:clamp(26px,7.5vw,40px);line-height:1.05;letter-spacing:.04em;margin-bottom:8px;}

    /* ── BUTTONS — gradient border with glow ── */
    .btn-grad-wrap{display:block;width:100%;padding:8px;border-radius:var(--r-pill);background:var(--btn-grad);cursor:pointer;border:none;transition:transform .25s ease,box-shadow .25s ease;box-shadow:0 0 18px rgba(255,207,164,.25),0 0 36px rgba(192,132,252,.15);}
    .btn-grad-wrap:active{transform:scale(.97);}
    .btn-grad-inner{display:flex;align-items:center;justify-content:center;background:var(--dark);color:var(--text);font-family:var(--ff-b);font-weight:700;font-size:15px;padding:14px 36px;border-radius:var(--r-pill);transition:background .25s ease;text-align:center;width:100%;border:none;cursor:pointer;white-space:normal;line-height:1.3;}
    .btn-grad-wrap:active .btn-grad-inner{background:rgba(8,11,18,.75);}
    /* Pay button — gradient fill */
    .btn-pay{display:block;width:100%;padding:4px;border-radius:var(--r-pill);background:var(--btn-grad);cursor:pointer;border:none;transition:transform .25s ease,box-shadow .25s ease;box-shadow:0 0 18px rgba(255,207,164,.2);}
    .btn-pay:active{transform:scale(.97);}
    .btn-pay-i{display:flex;align-items:center;justify-content:center;background:rgba(255,207,164,.12);color:var(--text);font-family:var(--ff-b);font-weight:700;font-size:15px;padding:14px 36px;border-radius:var(--r-pill);text-align:center;width:100%;border:none;cursor:pointer;}

    /* ── STICKY NAV (links + button only, no logos) ── */
    #nav{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-120px);z-index:9999;width:calc(100% - 24px);max-width:480px;background:linear-gradient(135deg,rgba(160,50,120,.7),rgba(25,45,70,.75));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,207,164,.2);border-radius:var(--r-pill);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:transform .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.3);will-change:transform;pointer-events:none;visibility:hidden;}
    #nav *{pointer-events:auto;}
    #nav.vis{transform:translateX(-50%) translateY(0)!important;visibility:visible!important;}
    .nav-links{display:flex;align-items:center;gap:14px;}
    .nav-links a{font-family:var(--ff-b);font-size:13px;font-weight:600;letter-spacing:.02em;color:#fff;text-decoration:none;white-space:nowrap;}
    .nav-links a:active{color:var(--peach);}
    .nav-btn{padding:1.5px;border-radius:var(--r-pill);background:var(--btn-grad);border:none;cursor:pointer;flex-shrink:0;}
    .nav-btn-i{display:flex;align-items:center;background:var(--dark);color:var(--text);font-family:var(--ff-d);font-size:13px;letter-spacing:.06em;padding:7px 14px;border-radius:var(--r-pill);white-space:nowrap;}

    /* ── HERO ── */
    #hero{position:relative;padding:48px 0 44px;overflow:hidden;background:#080B12;}
    #hero-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
    #hero-bg svg{position:absolute;right:-8%;top:8%;opacity:.055;width:65%;max-width:260px;}
    #hero::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(37,69,93,.55) 0%,rgba(8,11,18,.96) 68%);z-index:1;}
    #hero .w{position:relative;z-index:2;}
    /* Top logos */
    .hero-logos{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
    .hero-opora{height:34px;width:auto;object-fit:contain;border-radius:6px;}
    .hero-ivision{height:30px;width:auto;object-fit:contain;}
    /* Date pill */
    .pill-tag{display:inline-flex;align-items:center;background:rgba(255,207,164,.08);border:1px solid rgba(255,207,164,.28);color:var(--peach);border-radius:var(--r-pill);padding:5px 14px;font-size:12px;font-weight:600;font-family:var(--ff-b);}
    /* Date + Countdown row */
    .hero-date-row{display:flex;align-items:stretch;gap:8px;margin-bottom:8px;flex-wrap:nowrap;}
    .pill-tag{align-self:center;}
    /* Countdown pill */
    .cd-pill{display:inline-flex;align-items:center;gap:3px;background:rgba(200,75,158,.12);border:1px solid var(--pink);border-radius:var(--r-pill);padding:5px 12px;font-family:var(--ff-b);font-size:13px;letter-spacing:.03em;color:var(--text);flex-wrap:nowrap;white-space:nowrap;}
    .cd-pill-label{color:#F5B8D8;font-size:10px;letter-spacing:.05em;font-family:var(--ff-b);font-weight:700;margin-right:3px;}
    .cd-num{color:var(--peach);font-size:15px;min-width:18px;text-align:center;}
    .cd-sep{color:var(--muted);opacity:.6;font-size:13px;}
    .cd-unit{font-family:var(--ff-b);font-size:8px;color:var(--muted);letter-spacing:.05em;margin-left:1px;}
    /* Conf line */
    .h-conf-line{font-size:13px;color:var(--muted);font-weight:500;margin:16px 0 6px;}
    /* Big subtitle */
    .h-name-big{font-family:var(--ff-d);font-size:clamp(34px,10vw,52px);line-height:.95;letter-spacing:.02em;color:var(--text);margin-bottom:14px;}
    .h-tagline{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:20px;}
    /* Seats row */
    .h-seats-row{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-top:14px;margin-bottom:18px;}
    .h-seats-label{font-size:12px;color:var(--muted);}
    .h-seats-free{font-family:var(--ff-d);font-size:22px;color:var(--pink);line-height:1;}
    .h-seats-sep{font-size:14px;color:var(--muted);}
    .h-seats-total{font-family:var(--ff-d);font-size:20px;color:var(--text);line-height:1;}
    /* Gifts */
    .gifts-label{font-family:var(--ff-d);font-size:15px;letter-spacing:.1em;color:var(--peach);margin-bottom:10px;}
    .h-gifts{display:flex;flex-direction:column;gap:7px;}
    .h-gift{display:flex;align-items:flex-start;gap:9px;font-size:12px;color:var(--muted);line-height:1.4;}
    .h-gift-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);flex-shrink:0;margin-top:4px;}

    /* ── MARQUEE (2 rows) ── */
    #marquee-sec{background:var(--peach);overflow:hidden;padding:0;}
    .mq-track{display:flex;height:40px;align-items:center;overflow:hidden;}
    .mq-track+.mq-track{border-top:1px solid rgba(8,11,18,.15);}
    .mq-inner{display:flex;white-space:nowrap;animation:mqleft 32s linear infinite;}
    .mq-inner.rev{animation:mqright 32s linear infinite;}
    .mq-item{font-family:var(--ff-b);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dark);padding:0 18px;}
    .mq-dot{opacity:.3;padding:0 2px;}
    @keyframes mqleft{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    @keyframes mqright{from{transform:translateX(-50%)}to{transform:translateX(0)}}

    /* ── MISSION ── */
    .mission-body{padding:32px 20px;margin-top:24px;background:url(/img/circles.jpeg) center/cover;border-radius:20px;border:1px solid rgba(200,75,158,.15);position:relative;z-index:1;}
    .mission-body::before{content:'';position:absolute;inset:0;background:rgba(8,11,18,.75);border-radius:20px;z-index:0;pointer-events:none;}
    .mission-body>*{position:relative;z-index:1;}
    .mission-intro{font-size:15px;font-weight:400;color:var(--peach);margin-bottom:14px;line-height:1.5;}
    .slogan-frame{background:linear-gradient(var(--dark),var(--dark)) padding-box,linear-gradient(135deg,var(--pink),var(--peach)) border-box;border:2px solid transparent;border-radius:var(--r-md);padding:14px 12px;text-align:center;color:#fff;font-family:var(--ff-d);font-size:clamp(12px,3.6vw,20px);letter-spacing:.04em;line-height:1.3;margin:16px 0;white-space:nowrap;overflow:hidden;}
    .mission-photo{width:100%;border-radius:var(--r-md);margin:16px 0;display:block;}
    .mission-text{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:14px;}
    .mission-footer{font-size:13px;color:var(--peach);font-weight:700;text-transform:uppercase;line-height:1.6;font-style:italic;border-left:3px solid var(--peach);padding-left:14px;}

    /* ── GIFTS 3-COLUMN ── */
    .gifts3-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px;}
    .gift3-card{background:rgba(17,24,39,.8);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;position:relative;overflow:hidden;}
    .gift3-img{width:100%;height:78px;display:flex;align-items:center;justify-content:center;}
    .gift3-img svg{width:100%;height:100%;}
    .gift3-num{font-family:var(--ff-d);font-size:28px;color:rgba(255,207,164,.12);position:absolute;top:6px;left:8px;line-height:1;}
    .gift3-text{font-size:10px;color:var(--muted);line-height:1.4;}
    /* Ribbon with bow — diagonal stripe across bottom-right corner */
    .gift3-ribbon{position:absolute;bottom:0;right:0;width:56px;height:56px;pointer-events:none;}

    /* ── SPACES ── */
    .spaces-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px;}
    .space-card{background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 14px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;}
    /* Анимация въезда для левой колонки */
    .spaces-grid>:nth-child(odd){animation:slideFromLeft 0.8s ease-out both;animation-play-state:paused;}
    /* Анимация въезда для правой колонки */
    .spaces-grid>:nth-child(even){animation:slideFromRight 0.8s ease-out both;animation-play-state:paused;}
    /* При скролле — запускаем анимацию */
    .spaces-grid.visible>:nth-child(odd){animation-play-state:running;}
    .spaces-grid.visible>:nth-child(even){animation-play-state:running;}
    @keyframes slideFromLeft{from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);}}
    @keyframes slideFromRight{from{opacity:0;transform:translateX(30px);} to{opacity:1;transform:translateX(0);}}
    .sp-icon{width:32px;height:32px;color:var(--pink);margin-bottom:4px;flex-shrink:0;}
    .sp-icon svg{width:100%;height:100%;}
    .sp-head{font-family:var(--ff-d);font-size:16px;color:var(--peach);letter-spacing:.04em;margin-bottom:6px;}
    .sp-text{font-size:12px;color:var(--muted);line-height:1.5;}
    .quote-block{background:linear-gradient(var(--dark),var(--dark)) padding-box,linear-gradient(135deg,var(--pink),var(--peach)) border-box;border:2px solid transparent;border-radius:var(--r-md);padding:18px 20px;margin-top:20px;text-align:center;}
    .quote-text{font-family:var(--ff-d);font-size:clamp(18px,5vw,22px);line-height:1.3;letter-spacing:.03em;}

    /* ── SPECIAL ── */
    .special-list{display:flex;flex-direction:column;gap:10px;margin-top:24px;}
    .sp-item{display:flex;gap:14px;align-items:flex-start;background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;}
    .sp-ico{width:34px;height:34px;flex-shrink:0;color:var(--peach);}
    .sp-ico svg{width:100%;height:100%;}
    .sp-title{font-family:var(--ff-d);font-size:16px;letter-spacing:.04em;margin-bottom:3px;}
    .sp-desc{font-size:12px;color:var(--muted);line-height:1.5;}

    /* ── STATS ── */
    .stats4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:24px;}
    .st4{padding:20px 14px;text-align:center;}
    .sv4{font-family:var(--ff-d);font-size:clamp(42px,11vw,58px);color:var(--peach);line-height:1;}
    .sl4{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.3;}

    /* ── SPEAKERS ── */
    .spk-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:24px;}
    .spk-card{background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;position:relative;}
    /* Headliner: full-width, highlighted */
    .spk-card.spk-headliner{grid-column:1/-1;border-color:transparent;background:linear-gradient(var(--card),var(--card)) padding-box,linear-gradient(135deg,var(--peach),var(--purple)) border-box;box-shadow:0 0 40px rgba(200,75,158,.15);}
    /* Organizer: full-width */
    .spk-card.spk-organizer{grid-column:1/-1;}
    .spk-badge{font-family:'Roboto',sans-serif;font-weight:700;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#080B12;background:linear-gradient(135deg,var(--peach),var(--purple));padding:4px 18px;border-radius:var(--r-pill);margin-bottom:4px;}
    .spk-org-badge{background:linear-gradient(135deg,var(--teal),var(--purple));}
    .spk-photo{width:76px;height:76px;border-radius:50%;overflow:hidden;border:2px solid var(--border);flex-shrink:0;}
    .spk-card.spk-headliner .spk-photo{width:96px;height:96px;border-color:rgba(255,207,164,.5);}
    .spk-photo img{width:100%;height:100%;object-fit:cover;object-position:top;}
    .spk-init{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--teal),var(--purple));color:#fff;font-family:'Roboto',sans-serif;font-weight:700;font-size:20px;}
    .spk-name{font-family:'Roboto',sans-serif;font-weight:700;font-size:16px;letter-spacing:.03em;line-height:1.2;text-transform:uppercase;}
    .spk-card.spk-headliner .spk-name{font-size:22px;}
    .spk-role{font-size:10px;color:var(--peach);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
    .spk-creds{list-style:none;text-align:left;width:100%;margin-top:4px;}
    .spk-creds li{font-size:11px;color:var(--muted);padding:4px 0 4px 14px;border-bottom:1px solid rgba(255,207,164,.06);line-height:1.4;position:relative;}
    .spk-creds li::before{content:'◆';position:absolute;left:0;top:5px;font-size:6px;color:var(--peach);}
    .spk-creds li:last-child{border-bottom:none;}

    /* ── FOUNDER ── */
    .founder-sec{background:var(--mid);}
    .founder-grid{display:flex;flex-direction:column;gap:24px;margin-top:24px;align-items:center;}
    .founder-photo-wrap{position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .founder-photo-wrap::before{content:'';position:absolute;inset:-5px;border-radius:50%;background:conic-gradient(from 0deg,transparent 0%,rgba(255,207,164,.7) 30%,rgba(192,132,252,.9) 50%,rgba(200,75,158,.7) 70%,transparent 100%);animation:founderSpin 6s linear infinite;filter:blur(5px);z-index:0;}
    .founder-photo{position:relative;z-index:1;width:210px;height:210px;border-radius:50%;object-fit:cover;object-position:center top;display:block;}
    .founder-creds{flex:1;width:100%;}
    .founder-creds ul{list-style:none;}
    .founder-creds li{font-size:13px;color:var(--muted);padding:6px 0 6px 16px;border-bottom:1px solid rgba(255,207,164,.06);line-height:1.4;position:relative;}
    .founder-creds li::before{content:'◆';position:absolute;left:0;top:8px;font-size:6px;color:var(--peach);}
    .founder-creds li:last-child{border-bottom:none;}
    .founder-role{font-size:12px;color:var(--peach);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;}
    @keyframes founderSpin{to{transform:rotate(360deg);}}
    @media(min-width:641px){
      .founder-grid{flex-direction:row;align-items:flex-start;gap:40px;justify-content:center;}
      .founder-photo-wrap{width:280px;height:280px;}
      .founder-photo{width:270px;height:270px;}
    }

    /* ── PARTNERS ── */
    .partners-list{display:flex;flex-direction:column;gap:12px;margin-top:20px;}
    .partner-card{display:flex;flex-direction:column;align-items:center;gap:14px;background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 20px;text-align:center;}
    .partner-card:nth-child(4){animation-delay:0.45s;}
    .partner-card:nth-child(5){animation-delay:0.6s;}
    .partner-card:nth-child(6){animation-delay:0.75s;}
    .partner-card:nth-child(n+7){animation-delay:0.9s;}
    .partner-logo{display:block;}
    .partner-logo-type-logo{max-width:140px;max-height:80px;width:auto;height:auto;object-fit:contain;border-radius:var(--r-md);}
    .partner-logo-type-person{width:80px;height:80px;border-radius:50%;object-fit:cover;}
    .partner-name{font-family:'Roboto',sans-serif;font-weight:700;font-size:16px;letter-spacing:.03em;line-height:1.2;text-transform:uppercase;margin-bottom:8px;}
    .partner-info{list-style:none;text-align:left;width:100%;margin-top:4px;}
    .partner-info li{font-size:11px;color:var(--muted);padding:4px 0 4px 14px;border-bottom:1px solid rgba(255,207,164,.06);line-height:1.4;position:relative;}
    .partner-info li::before{content:'◆';position:absolute;left:0;top:5px;font-size:6px;color:var(--peach);}
    .partner-info li:last-child{border-bottom:none;}

    /* ── BENEFITS ── */
    .ben-grid{display:grid;grid-template-columns:1fr;gap:20px;margin-top:24px;}
    /* Top 3 benefits with images (large visual cards) */
    .ben-img-grid{display:grid;grid-template-columns:1fr;gap:20px;margin-bottom:32px;}
    .ben-img-card{display:flex;flex-direction:column;gap:14px;}
    .ben-img-card-img{width:100%;height:220px;border-radius:20px;overflow:hidden;object-fit:cover;display:block;}
    .ben-img-card-title{font-family:var(--ff-d);font-size:20px;letter-spacing:.03em;color:var(--peach);}
    .ben-img-card-text{font-size:13px;color:var(--muted);line-height:1.5;}
    /* Bottom 4 benefits (simple list format) */
    .ben-list{display:flex;flex-direction:column;gap:14px;}
    .ben-list-item{display:flex;gap:14px;align-items:flex-start;padding:14px;background:rgba(255,207,164,.04);border:1px solid rgba(255,207,164,.1);border-radius:var(--r-md);}
    .ben-list-num{font-family:var(--ff-d);font-size:24px;color:var(--peach);flex-shrink:0;line-height:1;}
    .ben-list-content{flex:1;}
    .ben-list-title{font-family:var(--ff-d);font-size:15px;letter-spacing:.03em;margin-bottom:4px;}
    .ben-list-text{font-size:12px;color:var(--muted);line-height:1.4;}
    /* Desktop: 3 columns for image cards */
    @media(min-width:641px){
      .ben-img-grid{grid-template-columns:repeat(3,1fr);}
      .ben-img-card-img{height:280px;}
      .ben-list{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
    }

    /* ── SCHEDULE / ACCORDION ── */
    .sched{display:flex;flex-direction:column;gap:14px;margin-top:24px;}
    .sched-day{background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
    .sd-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;cursor:pointer;user-select:none;}
    .sd-header-left{display:flex;flex-direction:column;gap:2px;}
    .sd-name{font-family:var(--ff-d);font-size:20px;color:var(--peach);letter-spacing:.04em;line-height:1.1;}
    .sd-date{font-size:11px;color:var(--muted);}
    .sd-arrow{width:20px;height:20px;color:var(--muted);flex-shrink:0;transition:transform .3s ease;}
    .sched-day.open .sd-arrow{transform:rotate(180deg);}
    .sd-body{display:none;padding:0 20px 16px;}
    .sched-day.open .sd-body{display:block;}
    .slot{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,207,164,.06);align-items:flex-start;}
    .slot:last-child{border-bottom:none;}
    .sl-time{font-size:11px;font-weight:700;color:var(--peach);min-width:56px;padding-top:1px;flex-shrink:0;}
    .sl-title{font-size:13px;line-height:1.4;}

    /* ── TARIFFS ── */
    .tariffs{display:flex;flex-direction:column;gap:16px;margin-top:24px;}
    .tariff{background:rgba(17,24,39,.7);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 20px;position:relative;}
    .tariff.rec{border-color:transparent;background:linear-gradient(var(--card),var(--card)) padding-box,linear-gradient(135deg,var(--peach),var(--purple)) border-box;box-shadow:0 0 48px rgba(200,75,158,.1);}
    .t-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--peach),var(--purple));color:#080B12;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 16px;border-radius:var(--r-pill);white-space:nowrap;}
    .t-name{font-family:var(--ff-d);font-size:22px;letter-spacing:.04em;margin-bottom:4px;}
    .t-price{font-family:var(--ff-d);font-size:28px;color:var(--peach);margin-bottom:5px;}
    .t-seats{font-size:12px;color:var(--pink);font-weight:700;margin-bottom:16px;}
    .feat{list-style:none;margin-bottom:20px;}
    .feat li{font-size:13px;padding:7px 0;border-bottom:1px solid rgba(255,207,164,.06);display:flex;gap:9px;align-items:flex-start;line-height:1.45;}
    .feat li:last-child{border-bottom:none;}
    .feat li.y::before{content:'✓';color:var(--peach);flex-shrink:0;font-weight:700;}
    .feat li.y.highlight{color:var(--peach);font-weight:600;}
    .feat li.n{color:var(--dim);}
    .feat li.n::before{content:'✗';color:rgba(255,207,164,.22);flex-shrink:0;}
    .t-description{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.5;padding:8px;background:rgba(255,207,164,.06);border-radius:var(--r-md);}
    /* Аккордеон description для PREMIUM */
    .t-head{display:flex;flex-direction:column;}
    .t-desc-toggle{display:flex;align-items:flex-start;flex-wrap:wrap;cursor:pointer;padding:8px;border:1px solid rgba(255,207,164,.18);background:rgba(255,207,164,.06);border-radius:var(--r-md);margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.5;user-select:none;transition:all .3s ease;}
    .t-desc-text{flex:1 0 calc(100% - 28px);padding-right:8px;}
    .t-desc-more{display:none;flex:1 0 100%;margin-top:4px;}
    .tariff.desc-open .t-desc-more{display:block;}
    .t-desc-arrow{width:18px;height:18px;flex-shrink:0;color:var(--pink);transition:transform .3s ease;}
    .tariff.desc-open .t-desc-arrow{transform:rotate(180deg);}
    .t-desc-placeholder{height:42px;margin-bottom:12px;}

    /* ── TITLES CAROUSEL (SCROLLING WITH CHAOS) ── */
    .titles-scroll-chaos{position:relative;height:340px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .titles-scroll-inner{display:flex;gap:28px;animation:scrollChaos 45s linear infinite;}
    .title-scroll-item{flex-shrink:0;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:rgba(255,207,164,.08);filter:drop-shadow(0 6px 16px rgba(0,0,0,.4));}
    .title-scroll-item{width:200px;height:200px;transform:rotateZ(0deg);}
    .title-scroll-item:nth-child(odd){transform:rotateZ(-8deg) rotateY(4deg);}
    .title-scroll-item:nth-child(even){transform:rotateZ(6deg) rotateY(-4deg);}
    .title-scroll-item img{width:100%;height:100%;object-fit:cover;}
    @keyframes scrollChaos{0%{transform:translateX(0)} 100%{transform:translateX(calc(-50%))}}

    /* ── SPECIAL SECTION (3 COLUMNS FOR WEB) ── */
    .special-layout{display:flex;flex-direction:column;gap:20px;margin-top:28px;}
    .special-left,.special-right{display:flex;flex-direction:column;gap:12px;}
    .special-item{display:flex;gap:10px;align-items:flex-start;padding:12px;background:rgba(17,24,39,.6);border:1px solid var(--border);border-radius:var(--r-md);transition:all .3s ease;}
    .special-item:hover{background:rgba(17,24,39,.9);border-color:var(--peach);}
    .special-item-icon{width:28px;height:28px;color:var(--peach);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .special-item-icon svg{width:100%;height:100%;}
    .special-item-content{flex:1;}
    .special-item-title{font-family:var(--ff-d);font-size:13px;letter-spacing:.02em;color:var(--peach);margin-bottom:2px;}
    .special-item-text{font-size:10px;color:var(--muted);line-height:1.4;}
    .special-center{width:100%;height:300px;background:linear-gradient(135deg,rgba(25,69,93,.25),rgba(200,75,158,.15));border-radius:var(--r-lg);overflow:visible;display:flex;align-items:center;justify-content:space-between;position:relative;}
    .chastushki-carousel{flex:1;height:100%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;border-radius:var(--r-lg);}
    .chastushki-scroll{width:100%;height:100%;position:relative;}
    .chastushki-item{width:100%;height:100%;display:none;align-items:center;justify-content:center;}
    .chastushki-item.active{display:flex;}
    .chastushki-item video{width:100%;height:100%;object-fit:contain;background:#000;cursor:pointer;}
    .chastushki-arrow{position:relative;width:40px;height:40px;background:var(--pink);border:none;color:#fff;font-size:24px;cursor:pointer;z-index:10;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .2s ease;flex-shrink:0;}
    .chastushki-arrow:active{transform:scale(.95);}
    .chastushki-arrow-prev{}
    .chastushki-arrow-next{}
    @media(max-width:640px){
      .special-center{aspect-ratio:9/16;width:100%;margin:0 auto;}
      .chastushki-item video{width:100%;height:100%;object-fit:cover;}
    }
    video::cue{display:none;}
    video::-webkit-media-controls-start-playback-button{display:none;}
    @media(min-width:641px){
      .special-layout{flex-direction:row;gap:16px;align-items:center;justify-content:center;}
      .special-left{flex:0 0 28%;display:flex;flex-direction:column;gap:12px;}
      .special-center{flex:0 0 36%;height:450px;border-radius:12px;}
      .special-right{flex:0 0 28%;display:flex;flex-direction:column;gap:12px;}
      .special-item{padding:10px;gap:8px;}
      .special-item-icon{width:24px;height:24px;}
      .special-item-title{font-size:12px;}
      .special-item-text{font-size:9px;}
    }

    /* ── REVIEWS CAROUSEL (like titles) ── */
    .reviews-carousel{position:relative;height:auto;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:24px 0;}
    .reviews-scroll-inner{display:flex;gap:16px;animation:scrollReviews 30s linear infinite;align-items:center;will-change:transform;transform:translateZ(0);}
    @media(max-width:640px){.reviews-scroll-inner{animation:scrollReviews 30s linear infinite;}}
    .review-item{flex-shrink:0;border-radius:12px;overflow:hidden;border:3px solid var(--pink);filter:drop-shadow(0 6px 16px rgba(0,0,0,.4));box-shadow:0 4px 12px rgba(0,0,0,.3);}
    @media(max-width:640px){.review-item{filter:none;box-shadow:0 2px 8px rgba(0,0,0,.2);}}
    .review-item:nth-child(odd){transform:rotateZ(-7deg) rotateY(3deg);}
    .review-item:nth-child(even){transform:rotateZ(7deg) rotateY(-3deg);}
    .review-item img{height:auto;width:auto;max-height:187px;object-fit:contain;}
    @media(max-width:640px){.review-item img{max-height:159px;}}
    @keyframes scrollReviews{0%{transform:translateX(0)} 100%{transform:translateX(calc(-50%))}}

    /* ── BENEFITS ── (no icons) */

    /* ── FINAL CTA ── */
    #cta{background:linear-gradient(160deg,#25455D 0%,#080B12 65%);padding:52px 0;text-align:center;}

    /* ── FOOTER ── */
    #site-footer{background:#04060d;padding:28px 0;border-top:1px solid rgba(255,207,164,.08);}
    .footer-links{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;}
    .footer-links a,.footer-link-btn{font-size:11px;color:var(--muted);text-decoration:underline;text-underline-offset:3px;}
    .footer-link-btn{background:none;border:none;padding:0;cursor:pointer;font-family:inherit;}
    .footer-legal{font-size:11px;color:var(--dim);line-height:1.6;}

    /* ── GC MODALS ── */
    .gc-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:99999;align-items:flex-start;justify-content:center;overflow-y:auto;}
    .gc-box{background:#16162a;border:1px solid rgba(255,207,164,.2);padding:48px 18px 28px;border-radius:var(--r-lg);max-width:480px;width:92%;position:relative;margin:40px auto;}
    .gc-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#aaa;font-size:30px;cursor:pointer;line-height:1;}

    /* ── ACCESS ── */
    #access{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:40px 24px;background:linear-gradient(160deg,#25455D 0%,#080B12 65%);}
    #access .check{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--peach),var(--purple));display:flex;align-items:center;justify-content:center;margin:0 auto;}
    #access .check svg{width:36px;height:36px;color:#080B12;}
    #access h2{font-family:var(--ff-d);font-size:34px;letter-spacing:.03em;}
    #access p{font-size:14px;color:var(--muted);max-width:280px;line-height:1.6;}

    /* ── DESKTOP WIDE LAYOUT ── */
    @media (min-width:641px){
      .w{max-width:1100px;padding:0 48px;}
      #nav{max-width:1100px;width:calc(100% - 48px);}
      .spk-grid{grid-template-columns:1fr 1fr;}
      /* Buttons: not full-width */
      .btn-align .btn-grad-wrap{width:auto;display:inline-block;}
      .btn-align .btn-pay{width:auto;display:inline-block;}
      /* Tariffs: 3 columns (БАЗОВЫЙ | VIP | PREMIUM) */
      .tariffs{display:grid;grid-template-columns:1fr 1fr 1fr;align-items:start;gap:16px;}
      /* Headliner/organizer creds: centered block, left text */
      .spk-headliner .spk-creds,.spk-organizer .spk-creds{max-width:560px;margin-left:auto;margin-right:auto;}
      /* Hero seats row: left-aligned under button */
      .h-seats-row{justify-content:flex-start;}
    }

    /* ── LOADING ── */
    #loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
    .spin{width:34px;height:34px;border:3px solid rgba(255,207,164,.15);border-top-color:var(--peach);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-txt{font-size:13px;color:var(--muted);}
  </style>
</head>

  <h2>Вы зарегистрированы!</h2>

  <p id="access-name" style="font-size:13px;color:rgba(245,240,232,.35)"></p>
</div>

<script>
var tg=(window.Telegram&&window.Telegram.WebApp)||null;
if(tg){tg.ready();tg.expand();}

/* SAFARI MOBILE - FASTER REVIEWS */
if(/^((?!chrome|android).)*safari/i.test(navigator.userAgent)&&window.innerWidth<=640){
  var style=document.createElement('style');
  style.textContent='.reviews-scroll-inner{animation:scrollReviews 10s linear infinite!important;}';
  document.head.appendChild(style);
}

/* NAV */
var nav=document.getElementById('nav');
window.addEventListener('scroll',function(){
  if(window.scrollY>80){nav.classList.add('vis');}
  else{nav.classList.remove('vis');}
},{passive:true});
document.addEventListener('click',function(ev){
  var a=ev.target.closest('[data-nav]');
  if(a){ev.preventDefault();var el=document.getElementById(a.dataset.nav);if(el)el.scrollIntoView({behavior:'smooth'});}
  if(ev.target.closest('[data-to-tariffs]')){var el=document.getElementById('tariffs-sec');if(el)el.scrollIntoView({behavior:'smooth'});}
  var sh=ev.target.closest('.sd-header');
  if(sh){sh.parentElement.classList.toggle('open');}
  var arrow=ev.target.closest('.chastushki-arrow');
  if(arrow){
    var carousel=document.getElementById('chastushki-carousel');
    if(carousel){
      var items=carousel.querySelectorAll('.chastushki-item');
      var active=carousel.querySelector('.chastushki-item.active');
      var idx=Array.from(items).indexOf(active);
      var dir=parseInt(arrow.dataset.dir);
      idx=(idx+dir+items.length)%items.length;
      if(active){
        var oldVideo=active.querySelector('video');
        if(oldVideo){oldVideo.pause();oldVideo.currentTime=0;}
      }
      items.forEach(function(item){item.classList.remove('active');});
      items[idx].classList.add('active');
    }
  }
});
document.getElementById('nav-cta-btn').addEventListener('click',function(){
  var el=document.getElementById('tariffs-sec');if(el)el.scrollIntoView({behavior:'smooth'});
});

/* GC MODALS */
function openGC(id){document.getElementById(id).style.display='flex';document.body.style.overflow='hidden';}
function closeGC(id){document.getElementById(id).style.display='none';document.body.style.overflow='';}

/* COUNTDOWN */
function updateCountdown(){
  var target=new Date('2026-04-23T09:00:00+03:00');
  var diff=target-new Date();
  if(diff<=0){
    ['cd-d','cd-h','cd-m','cd-s','cd-d2','cd-h2','cd-m2','cd-s2'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent='00';});
    return;
  }
  function pad(n){return String(Math.floor(n)).padStart(2,'0');}
  var days=Math.floor(diff/86400000);
  var hrs=pad((diff%86400000)/3600000);
  var mins=pad((diff%3600000)/60000);
  var secs=pad((diff%60000)/1000);
  var el=document.getElementById('cd-d');if(el)el.textContent=days;
  el=document.getElementById('cd-h');if(el)el.textContent=hrs;
  el=document.getElementById('cd-m');if(el)el.textContent=mins;
  el=document.getElementById('cd-s');if(el)el.textContent=secs;
  el=document.getElementById('cd-d2');if(el)el.textContent=days;
  el=document.getElementById('cd-h2');if(el)el.textContent=hrs;
  el=document.getElementById('cd-m2');if(el)el.textContent=mins;
  el=document.getElementById('cd-s2');if(el)el.textContent=secs;
}
setInterval(updateCountdown,1000);

/* COUNTER ANIMATION */
function animateCounter(el,target,suffix){
  var start=0,step=target/75;
  (function tick(){
    start+=step;if(start>=target){el.textContent=target+suffix;return;}
    el.textContent=Math.floor(start)+suffix;requestAnimationFrame(tick);
  })();
}
var countersStarted=false;
function watchCounters(){
  var el=document.querySelector('.stats4');if(!el)return;
  new IntersectionObserver(function(entries){
    if(entries[0].isIntersecting&&!countersStarted){
      countersStarted=true;
      document.querySelectorAll('[data-count]').forEach(function(el){
        animateCounter(el,parseInt(el.dataset.count,10),el.dataset.suffix||'');
      });
    }
  },{threshold:.3}).observe(el);
}
function watchSpaces(){
  var g=document.querySelector('.spaces-grid');if(!g)return;
  new IntersectionObserver(function(entries){
    if(entries[0].isIntersecting){g.classList.add('visible');}
  },{threshold:0.2}).observe(g);
}
function watchSpeakers(){}
function watchPartners(){}

/* OPEN EXTERNAL LINK (works in Telegram WebApp and browser) */
function openExternal(url){
  if(tg&&tg.openLink){tg.openLink(url);}else{window.open(url,'_blank');}
}
/* EQUALIZE SPEAKER NAME+ROLE HEIGHTS PER ROW (desktop only) */
function equalizeSpkRows(){
  if(window.innerWidth<=640)return;
  var cards=Array.prototype.slice.call(document.querySelectorAll('.spk-card:not(.spk-headliner):not(.spk-organizer)'));
  ['spk-name','spk-role'].forEach(function(cls){
    for(var i=0;i<cards.length;i+=2){
      var a=cards[i],b=cards[i+1];
      if(!b)continue;
      var ea=a.querySelector('.'+cls),eb=b.querySelector('.'+cls);
      if(!ea||!eb)continue;
      ea.style.minHeight='';eb.style.minHeight='';
      var h=Math.max(ea.offsetHeight,eb.offsetHeight);
      ea.style.minHeight=h+'px';eb.style.minHeight=h+'px';
    }
  });
}
window.addEventListener('resize',equalizeSpkRows,{passive:true});

/* EQUALIZE TARIFF HEADS (desktop only) */
function equalizeTariffHeads(){
  if(window.innerWidth<=640)return;
  var heads=document.querySelectorAll('.t-head');
  var maxH=0;
  heads.forEach(function(h){h.style.minHeight='';maxH=Math.max(maxH,h.offsetHeight);});
  heads.forEach(function(h){h.style.minHeight=maxH+'px';});
}
window.addEventListener('resize',equalizeTariffHeads,{passive:true});

/* MAIN */
var startParam=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.start_param)||'';
var firstName=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user&&tg.initDataUnsafe.user.first_name)||'';

if(startParam==='free'){
  document.getElementById('loading').style.display='none';
  document.getElementById('access').style.display='flex';
  if(firstName)document.getElementById('access-name').textContent=firstName+', ждём тебя на конференции!';
}else{
  fetch('./ivision-conf-7.json?v='+Date.now())
    .then(function(r){return r.json();})
    .then(function(c){
      render(c);
      document.getElementById('loading').style.display='none';
      document.getElementById('app').style.display='block';
      updateCountdown();
      watchCounters();
      watchSpaces();
      watchSpeakers();
      watchPartners();
      equalizeSpkRows();
      equalizeTariffHeads();
    })
    .catch(function(){
      document.getElementById('loading').innerHTML='<p style="color:var(--muted);text-align:center;padding:40px 20px">Не удалось загрузить.<br>Обнови страницу.</p>';
    });
}

function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function scrollBtn(label,leftAlign){
  var align=leftAlign?'left':'center';
  return '<div class="btn-align" style="text-align:'+align+'"><button class="btn-grad-wrap" data-to-tariffs><span class="btn-grad-inner">'+label+'</span></button></div>';
}
function payBtn(label,modalId){
  return '<div class="btn-align" style="text-align:center"><button class="btn-pay" onclick="openGC(\''+modalId+'\')"><span class="btn-pay-i">'+label+'</span></button></div>';
}

/* SVG icons for SPACES section (pink) */

    h+='<div class="spk-photo">'+(sp.photo_url?'<img src="'+e(sp.photo_url)+'" alt="'+e(sp.name)+'" loading="lazy">':'<div class="spk-init">'+e(initials)+'</div>')+'</div>';
    h+='<div class="spk-name">'+e(sp.name)+'</div>';
    h+='<div class="spk-role">'+e(sp.role)+'</div>';
    h+='<ul class="spk-creds">';
    sp.credentials.forEach(function(cr){h+='<li>'+e(cr)+'</li>';});
    h+='</ul></div>';
  });
  h+='</div></div></section>';

  /* PARTNERS */
  if(c.partners&&c.partners.length){
    h+='<section class="sec sa" id="partners-sec"><div class="w">';
    h+='<div class="h2">ПАРТНЁРЫ</div>';
    h+='<div class="partners-list">';
    c.partners.forEach(function(p){
      h+='<div class="partner-card">';
      if(p.logo){
        var logoType='partner-logo-type-'+(p.photo_type||'logo');
        h+='<img src="'+e(p.logo)+'" alt="'+e(p.name)+'" class="partner-logo '+logoType+'">';
      }
      h+='<div class="partner-name">'+e(p.name)+'</div>';
      h+='<ul class="partner-info">';
      if(Array.isArray(p.text)){
        p.text.forEach(function(t){h+='<li>'+e(t)+'</li>';});
      }else{
        h+='<li>'+e(p.text)+'</li>';
      }
      h+='</ul></div>';
    });
    h+='</div></div></section>';
  }

  /* FOUNDER */
  var org=c.speakers.filter(function(sp){return sp.status==='organizer';})[0];
  if(org){
    h+='<section class="sec sa founder-sec"><div class="w">';
    h+='<div class="lbl">ОСНОВАТЕЛЬ И МОДЕРАТОР</div>';
    h+='<div class="h2">'+e(org.name)+'</div>';
    h+='<div class="founder-grid">';
    h+='<div class="founder-photo-wrap">'+(org.photo_url?'<img class="founder-photo" src="'+e(org.photo_url)+'" alt="'+e(org.name)+'" loading="lazy">':'')+'</div>';
    h+='<div class="founder-creds"><div class="founder-role">'+e(org.role)+'</div><ul>';
    org.credentials.forEach(function(cr){h+='<li>'+e(cr)+'</li>';});
    h+='</ul></div>';
    h+='</div></div></section>';
  }

  /* BENEFITS */
  h+='<section class="sec sa"><div class="w">';
  h+='<div class="h2">Что ты получишь</div>';
  /* Top 3 benefits with images */
  var benImgs=['/img/dollars.png','/img/microphone.png','/img/speaker.png'];
  var benImgIdx={};
  benImgIdx['Маркетинг и продажи']=0;benImgIdx['Рычаги влияния']=1;benImgIdx['Масштабирование']=2;
  h+='<div class="ben-img-grid">';
  var imgCount=0;
  c.benefits.forEach(function(b){
    if(benImgIdx.hasOwnProperty(b.title)){
      var imgId=benImgIdx[b.title];
      h+='<div class="ben-img-card"><img class="ben-img-card-img" src="'+benImgs[imgId]+'" alt="'+e(b.title)+'" loading="lazy"><div class="ben-img-card-title">'+e(b.title)+'</div><div class="ben-img-card-text">'+e(b.text)+'</div></div>';
      imgCount++;
    }
  });
  h+='</div>';
  /* Bottom 4 benefits (list format) */
  h+='<div class="ben-list">';
  var listNum=1;
  c.benefits.forEach(function(b){
    if(!benImgIdx.hasOwnProperty(b.title)){
      h+='<div class="ben-list-item"><div class="ben-list-num">0'+listNum+'</div><div class="ben-list-content"><div class="ben-list-title">'+e(b.title)+'</div><div class="ben-list-text">'+e(b.text)+'</div></div></div>';
      listNum++;
    }
  });
  h+='</div>';
  h+='<div style="margin-top:32px">'+scrollBtn('ВОЙТИ В СРЕДУ СВОИХ')+'</div>';
  h+='</div></section>';

  /* PROGRAM */
  var spkStatusMap={};
  c.speakers.forEach(function(sp){ spkStatusMap[sp.name]=sp.status; });

  h+='<section class="sec" id="program-sec"><div class="w">';
  h+='<div class="h2">ПРОГРАММА КОНФЕРЕНЦИИ</div>';
  h+='<div class="sched" id="sched-list">';
  c.schedule.forEach(function(day,idx){
    h+='<div class="sched-day'+(idx===0?' open':'')+'">';
    h+='<div class="sd-header">';
    h+='<div class="sd-header-left"><div class="sd-name">'+e(day.day)+'</div><div class="sd-date">'+e(day.date)+'</div></div>';
    h+='<svg class="sd-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
    h+='</div>';
    h+='<div class="sd-body">';
    day.slots.forEach(function(sl){
      var theme=sl.theme||sl.title||'';
      var spkName=sl.speaker&&sl.speaker.trim();
      var spkLabel=spkName?(spkName+(spkStatusMap[spkName]==='headliner'?' - ХЕДЛАЙНЕР':'')):''
      var spkHtml=spkLabel?'<span style="color:var(--peach);font-size:13px;font-weight:600;"> ('+e(spkLabel)+')</span>':'';
      h+='<div class="slot"><div class="sl-time">'+e(sl.time)+'</div><div class="sl-title">'+e(theme)+spkHtml+'</div></div>';
    });
    h+='</div></div>';
  });
  h+='</div></div></section>';

  /* TARIFFS */
  h+='<section class="sec sa" id="tariffs-sec"><div class="w">';
  h+='<div class="h2">ВАРИАНТЫ УЧАСТИЯ</div>';
  h+='<div class="tariffs">';
  c.tariffs.forEach(function(t,i){
    h+='<div class="tariff'+(t.recommended?' rec':'')+(t.recommended?'" style="margin-top:14px':'')+'">';
    if(t.recommended)h+='<div class="t-badge">Рекомендуется</div>';
    h+='<div class="t-head">';
    h+='<div class="t-name">'+e(t.name)+'</div>';
    h+='<div class="t-price">'+e(t.price_label)+'</div>';
    if(t.seats_left)h+='<div class="t-seats">'+e(t.seats_left)+'</div>';
    h+='</div>';

    /* Для PREMIUM — description в аккордеоне с short/full */
    if(t.name==='PREMIUM'&&t.description_short){
      h+='<div class="t-desc-toggle" onclick="this.closest(\'.tariff\').classList.toggle(\'desc-open\')">';
      h+='<span class="t-desc-text">'+e(t.description_short)+'</span>';
      h+='<span class="t-desc-more">'+e(t.description_full)+'</span>';
      h+='<svg class="t-desc-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>';
      h+='</div>';
    } else if(t.name!=='PREMIUM'){
      /* Для БАЗОВЫЙ и VIP — placeholder (чтобы выровнять с PREMIUM description) */
      h+='<div class="t-desc-placeholder"></div>';
    } else if(t.description){
      h+='<div class="t-description">'+e(t.description)+'</div>';
    }

    /* Список фичей — для всех тарифов одинаково */
    var hasIncludedWhite=t.included_white&&t.included_white.length>0;
    var hasIncludedPeach=t.included_peach&&t.included_peach.length>0;
    h+='<ul class="feat">';
    if(hasIncludedWhite)t.included_white.forEach(function(f){h+='<li class="y">'+e(f)+'</li>';});
    if(hasIncludedPeach)t.included_peach.forEach(function(f){h+='<li class="y highlight">'+e(f)+'</li>';});
    if(t.not_included)t.not_included.forEach(function(f){h+='<li class="n">'+e(f)+'</li>';});
    h+='</ul>';

    /* Кнопка ВЫБРАТЬ для всех */
    var modal='gc-modal-t'+i;
    h+=payBtn('ВЫБРАТЬ',modal);
    h+='</div>';
  });
  h+='</div></div></section>';

  /* FINAL CTA */
  h+='<section id="cta"><div class="w">';
  h+='<div class="h2" style="text-align:center">Твоё место ждёт тебя</div>';
  /* Second countdown oval */
  h+='<div style="display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin:18px 0;">';
  h+='<div style="display:inline-flex;align-items:center;gap:6px;background:rgba(37,69,93,.5);border:2px solid rgba(255,207,164,.35);border-radius:var(--r-pill);padding:10px 20px;">';
  h+='<span style="font-family:var(--ff-b);font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-right:4px;">До старта</span>';
  h+='<span class="cd-num" id="cd-d2" style="font-family:var(--ff-d);font-size:22px;color:var(--peach);">--</span><span style="font-size:9px;color:var(--muted);font-family:var(--ff-b);">д</span>';
  h+='<span style="color:var(--muted);opacity:.5;margin:0 2px;">:</span>';
  h+='<span class="cd-num" id="cd-h2" style="font-family:var(--ff-d);font-size:22px;color:var(--peach);">--</span><span style="font-size:9px;color:var(--muted);font-family:var(--ff-b);">ч</span>';
  h+='<span style="color:var(--muted);opacity:.5;margin:0 2px;">:</span>';
  h+='<span class="cd-num" id="cd-m2" style="font-family:var(--ff-d);font-size:22px;color:var(--peach);">--</span><span style="font-size:9px;color:var(--muted);font-family:var(--ff-b);">м</span>';
  h+='<span style="color:var(--muted);opacity:.5;margin:0 2px;">:</span>';
  h+='<span class="cd-num" id="cd-s2" style="font-family:var(--ff-d);font-size:22px;color:var(--peach);">--</span><span style="font-size:9px;color:var(--muted);font-family:var(--ff-b);">с</span>';
  h+='</div></div>';
  h+='<p style="text-align:center;color:var(--muted);font-size:13px;margin:0 0 24px">'+e(c.dates)+' · Онлайн</p>';
  h+=scrollBtn('Зарегистрироваться бесплатно');
  h+='</div></section>';

  /* FOOTER */
  h+='<footer id="site-footer"><div class="w">';
  h+='<div class="footer-links">';
  h+='<button class="footer-link-btn" onclick="openExternal(\'https://medialift.margoforbs.ru/oferta_list\')">Договор оферты</button>';
  h+='<button class="footer-link-btn" onclick="openExternal(\'https://medialift.margoforbs.ru/politika\')">Политика обработки персональных данных</button>';
  h+='</div>';
  h+='<div class="footer-legal">ИП САХИБГАРЕЕВА МАРГАРИТА ВЛАДИМИРОВНА<br>ИНН 890306512862</div>';
  h+='</div></footer>';

  document.getElementById('app').innerHTML=h;

  /* VIDEO: force first frame as poster + restore on end */
  setTimeout(function(){
    var video=document.getElementById('conf-video');
    if(video){
      var forceFrame=function(){
        if(video.readyState>=2){
          try{
            var canvas=document.createElement('canvas');
            canvas.width=video.videoWidth||640;
            canvas.height=video.videoHeight||360;
            var ctx=canvas.getContext('2d');
            ctx.drawImage(video,0,0,canvas.width,canvas.height);
            var posterUrl=canvas.toDataURL('image/jpeg',0.8);
            video.setAttribute('poster',posterUrl);
          }catch(e){}
        }
      };
      video.addEventListener('loadeddata',forceFrame);
      video.addEventListener('canplay',forceFrame);
      video.addEventListener('ended',function(){
        this.currentTime=0.1;
        this.pause();
      });
      video.load();
    }
  },100);
}
</script>
</body>
</html>
